<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Typing Master Pro - Custom Sidebar</title>
    <style>
        :root {
            --bg: #dee2e6; --panel: #f8f9fa; --text: #212529;
            --primary: #007bff; --success: #28a745; --danger: #dc3545;
            --key-bg: #ffffff; --sidebar-w: 220px;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            margin: 0; display: flex; 
            height: 100vh; overflow: hidden;
        }

        /* Sidebar bên trái */
        .sidebar {
            width: var(--sidebar-w);
            background: white;
            border-right: 1px solid #adb5bd;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 10px 0;
        }
        .sidebar-item {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #0056b3;
            font-size: 14px;
            border-bottom: 1px solid #f1f1f1;
            transition: 0.2s;
        }
        .sidebar-item:hover { background: #e7f1ff; }
        .sidebar-item img {
            width: 18px; height: 18px;
            margin-right: 12px;
            filter: grayscale(100%); /* Làm icon mờ đi một chút cho chuyên nghiệp */
        }
        .sidebar-item:hover img { filter: none; }

        /* Vùng nội dung chính */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        /* Stats Bar */
        .stats { display: flex; width: 900px; background: var(--panel); padding: 15px; border-radius: 8px; justify-content: space-around; margin-bottom: 20px; border: 1px solid #adb5bd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-item { text-align: center; }
        .stat-label { font-size: 11px; display: block; font-weight: bold; }
        .stat-val { font-size: 18px; font-weight: bold; }

        /* Typing Area */
        .typing-container { width: 900px; background: var(--panel); padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .display-text { font-family: 'Consolas', monospace; font-size: 26px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ced4da; margin-bottom: 15px; min-height: 40px; }
        .char { border-bottom: 3px solid transparent; }
        .current { border-bottom-color: var(--primary); background: #e7f1ff; }
        .correct { color: #aaa; }
        .wrong { background: var(--danger); color: white; }

        /* Keyboard FIX LỆCH */
        .keyboard { display: flex; flex-direction: column; gap: 5px; background: #adb5bd; padding: 12px; border-radius: 10px; width: fit-content; margin: 0 auto; }
        .row { display: flex; gap: 5px; }
        .row-2 { margin-left: 20px; }
        .row-3 { margin-left: 40px; }
        .row-4 { margin-left: 150px; }

        .key { width: 42px; height: 42px; background: white; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; border: 1px solid #6c757d; box-shadow: 0 2px 0 #888; }
        .key.active { background: var(--success) !important; color: white; transform: translateY(2px); box-shadow: none; }
        .key.space { width: 280px; }

        #input-trigger { position: absolute; opacity: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="#" class="sidebar-item"><img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png"> Trang chủ</a>
        <a href="#" class="sidebar-item"><img src="https://cdn-icons-png.flaticon.com/512/3503/3503825.png"> Bài học 1</a>
        <a href="#" class="sidebar-item"><img src="https://cdn-icons-png.flaticon.com/512/3503/3503825.png"> Bài học 2</a>
        <a href="#" class="sidebar-item"><img src="https://cdn-icons-png.flaticon.com/512/3503/3503825.png"> Bài học 3</a>
        <a href="#" class="sidebar-item"><img src="https://cdn-icons-png.flaticon.com/512/2618/2618245.png"> Kiểm tra tốc độ</a>
        <a href="#" class="sidebar-item"><img src="https://cdn-icons-png.flaticon.com/512/686/686586.png"> Trò chơi</a>
        <a href="#" class="sidebar-item"><img src="https://cdn-icons-png.flaticon.com/512/10433/10433048.png"> Lịch sử</a>
        <a href="#" class="sidebar-item"><img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"> Giới thiệu</a>
    </div>

    <div class="main-content">
        <div style="font-weight: bold; margin-bottom: 10px; width: 900px;">Các phím mới: Hàng phím chính</div>
        
        <div class="stats">
            <div class="stat-item"><span class="stat-val" id="stat-count">0</span><span class="stat-label">Dấu hiệu</span></div>
            <div class="stat-item"><span class="stat-val" id="progress">0%</span><span class="stat-label">Phát triển</span></div>
            <div class="stat-item"><span class="stat-val" id="wpm">0</span><span class="stat-label">Từ/phút</span></div>
            <div class="stat-item"><span class="stat-val" id="errors">0</span><span class="stat-label">Lỗi</span></div>
            <div class="stat-item"><span class="stat-val" id="accuracy">100%</span><span class="stat-label">Tính chính xác</span></div>
            <div class="stat-item"><span class="stat-val" id="timer">00:00</span><span class="stat-label">Thời gian</span></div>
        </div>

        <div class="typing-container">
            <div class="display-text" id="display-text"></div>
            <input type="text" id="input-trigger" autofocus>

            <div class="keyboard" id="keyboard">
                <div class="row row-1">
                    <div class="key" id="k-q">q</div><div class="key" id="k-w">w</div><div class="key" id="k-e">e</div><div class="key" id="k-r">r</div><div class="key" id="k-t">t</div>
                    <div class="key" id="k-y">y</div><div class="key" id="k-u">u</div><div class="key" id="k-i">i</div><div class="key" id="k-o">o</div><div class="key" id="k-p">p</div>
                </div>
                <div class="row row-2">
                    <div class="key" id="k-a">a</div><div class="key" id="k-s">s</div><div class="key" id="k-d">d</div><div class="key" id="k-f">f</div><div class="key" id="k-g">g</div>
                    <div class="key" id="k-h">h</div><div class="key" id="k-j">j</div><div class="key" id="k-k">k</div><div class="key" id="k-l">l</div><div class="key" id="k-;">;</div>
                </div>
                <div class="row row-3">
                    <div class="key" id="k-z">z</div><div class="key" id="k-x">x</div><div class="key" id="k-c">c</div><div class="key" id="k-v">v</div><div class="key" id="k-b">b</div>
                    <div class="key" id="k-n">n</div><div class="key" id="k-m">m</div>
                </div>
                <div class="row row-4">
                    <div class="key space" id="k- ">Dấu cách</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const lesson = "aa ss dd ff jj kk ll ;; aa ss dd ff jj kk ll ;;";
        let charIndex = 0, errors = 0, startTime = null, timerInterval;

        const display = document.getElementById('display-text');
        const input = document.getElementById('input-trigger');

        function init() {
            display.innerHTML = lesson.split('').map((c, i) => `<span class="char ${i===0?'current':''}">${c}</span>`).join('');
            updateUI();
        }

        input.addEventListener('input', () => {
            if (!startTime) { startTime = new Date(); timerInterval = setInterval(updateTimer, 1000); }
            const typed = input.value;
            const target = lesson[charIndex];
            const charSpans = display.querySelectorAll('.char');

            if (typed[typed.length - 1] === target) {
                charSpans[charIndex].className = 'char correct';
                charIndex++;
                if (charIndex < lesson.length) charSpans[charIndex].classList.add('current');
            } else {
                charSpans[charIndex].classList.add('wrong');
                errors++;
            }
            input.value = "";
            updateUI();
            if (charIndex === lesson.length) { clearInterval(timerInterval); alert("Hoàn thành!"); location.reload(); }
        });

        function updateUI() {
            document.getElementById('stat-count').innerText = charIndex;
            document.getElementById('progress').innerText = Math.round((charIndex / lesson.length) * 100) + "%";
            document.getElementById('errors').innerText = errors;
            const acc = charIndex === 0 ? 100 : Math.round(((charIndex - errors) / charIndex) * 100);
            document.getElementById('accuracy').innerText = Math.max(0, acc) + "%";

            document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
            if (charIndex < lesson.length) {
                const key = document.getElementById('k-' + lesson[charIndex].toLowerCase());
                if (key) key.classList.add('active');
            }
        }

        function updateTimer() {
            const seconds = Math.floor((new Date() - startTime) / 1000);
            document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(14, 5);
            const wpm = Math.round((charIndex / 5) / (seconds / 60)) || 0;
            document.getElementById('wpm').innerText = wpm;
        }

        document.addEventListener('click', () => input.focus());
        init();
    </script>
</body>
</html>
