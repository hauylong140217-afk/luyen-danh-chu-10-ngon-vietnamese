<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Master PRO - Full Edition</title>
    <style>
        :root {
            /* Mặc định chế độ Sáng */
            --bg: #f8fafc; --panel: #ffffff; --primary: #38bdf8;
            --success: #22c55e; --danger: #ef4444; --text: #1e293b;
            --kb-bg: #e2e8f0; --key-bg: #ffffff; --key-text: #64748b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617; --panel: #1e293b; --primary: #38bdf8;
                --success: #22c55e; --danger: #ef4444; --text: #f8fafc;
                --kb-bg: #000000; --key-bg: #111827; --key-text: #94a3b8;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', 'Segoe UI', monospace;
            background: var(--bg); color: var(--text);
            display: flex; height: 100vh; overflow: hidden; transition: 0.3s;
        }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sb-title { padding: 25px; font-size: 16px; font-weight: 900; color: var(--primary); border-bottom: 1px solid rgba(0,0,0,0.1); text-align: center; }
        .ls-list { flex: 1; overflow-y: auto; padding: 10px; }
        .ls-item {
            padding: 12px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; font-size: 13px;
            display: flex; justify-content: space-between; transition: 0.2s; border: 1px solid transparent;
        }
        .ls-item:hover { background: rgba(56, 189, 248, 0.1); }
        .ls-item.active { background: var(--primary); color: #000; font-weight: bold; }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .stats-bar { height: 70px; display: flex; align-items: center; justify-content: space-around; background: rgba(0,0,0,0.05); }
        .stat-card { text-align: center; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--primary); display: block; }

        .typing-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 30px; }
        
        .display-box {
            width: 90%; max-width: 900px; background: var(--panel); padding: 40px; border-radius: 20px;
            min-height: 180px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05);
        }
        .word { display: flex; font-size: 32px; border-bottom: 3px solid transparent; padding: 2px 5px; border-radius: 4px; }
        .word.active { border-bottom-color: var(--primary); background: rgba(56, 189, 248, 0.1); }
        .word.ok { color: var(--success); }
        .word.err { background: var(--danger); color: #fff; }

        /* BÀN PHÍM ẢO (TAY) */
        .kb-box { background: var(--kb-bg); padding: 20px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); }
        .kb-row { display: flex; gap: 6px; margin-bottom: 6px; justify-content: center; }
        .key {
            width: 50px; height: 50px; background: var(--key-bg); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; color: var(--key-text);
            border-bottom: 4px solid rgba(0,0,0,0.3); transition: 0.1s;
        }
        .key.active { background: var(--primary); color: #000; transform: translateY(2px); border-bottom-width: 1px; box-shadow: 0 0 15px var(--primary); }
        .key.space { width: 300px; }

        /* BẢNG ĐIỂM TẠI CHỖ */
        #result-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel); padding: 40px; border-radius: 24px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); border: 2px solid var(--primary);
            display: none; z-index: 100; min-width: 350px;
        }
        .btn { margin-top: 20px; padding: 12px 25px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #hidden-input { position: fixed; top: -100px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sb-title">TYPING MASTERY</div>
    <div class="ls-list" id="ls-list"></div>
</div>

<div class="main">
    <div class="stats-bar">
        <div class="stat-card"><span class="stat-val" id="wpm">0</span><small>WPM</small></div>
        <div class="stat-card"><span class="stat-val" id="acc">0%</span><small>Độ chính xác</small></div>
        <div id="mode-label" style="font-weight: bold; font-size: 12px;">CHẾ ĐỘ</div>
    </div>

    <div class="typing-area">
        <div class="display-box" id="display"></div>
        <div class="kb-box" id="keyboard"></div>
        <div style="font-size: 13px; opacity: 0.6;">Mẹo: Nhấn <b>Space</b> sau mỗi từ. Hệ thống tự nhận Telex/VNI.</div>
    </div>

    <div id="result-panel">
        <h2 style="color: var(--primary); margin-bottom: 10px;">HOÀN THÀNH!</h2>
        <div id="score-details" style="font-size: 18px; margin: 20px 0;"></div>
        <button class="btn" onclick="nextLesson()">BÀI TIẾP THEO ➔</button>
    </div>
</div>

<input type="text" id="hidden-input" autofocus>

<script>
    const DATA = [
        "asdf jkl; asdf jkl;", "aaaa ssss dddd ffff", "jjjj kkkk llll ;;;;", "má mà mả mã mạ",
        "có công mài sắt có ngày nên kim", "uống nước nhớ nguồn", "ăn quả nhớ kẻ trồng cây",
        "lá lành đùm lá rách", "thương người như thể thương thân", "đi một ngày đàng học một sàng khôn",
        "có chí thì nên", "tốt gỗ hơn tốt nước sơn", "đói cho sạch rách cho thơm",
        "kiến tha lâu cũng đầy tổ", "không thầy đố mày làm nên", "học thầy không tày học bạn",
        "công cha như núi thái sơn", "nghĩa mẹ như nước trong nguồn chảy ra", "gần mực thì đen gần đèn thì sáng",
        "ăn chậm nhai kỹ", "học một biết mười", "thời gian là vàng bạc", "lời chào cao hơn mâm cỗ",
        "đoàn kết là sức mạnh", "sức khỏe là vốn quý nhất", "cái nết đánh chết cái đẹp", "chậm mà chắc",
        "nhập gia tùy tục", "nói đi đôi với làm", "tấc đất tấc vàng", "chân cứng đá mềm",
        "gieo gió gặt bão", "kính trên nhường dưới", "uống nước nhớ người đào giếng",
        "luyện tay mỗi ngày", "kỹ năng gõ mười ngón", "kiên trì sẽ thành công", "làm việc có kế hoạch",
        "đam mê dẫn lối", "tập trung là chìa khóa", "sáng tạo không ngừng", "thất bại là mẹ thành công",
        "vượt qua giới hạn bản thân", "tri thức là sức mạnh", "đường tuy ngắn không đi không đến",
        "việc tuy nhỏ không làm không xong", "tiên học lễ hậu học văn", "một con ngựa đau cả tàu bỏ cỏ",
        "ăn quả nhớ kẻ trồng cây", "có công mài sắt có ngày nên kim", "mùa xuân là tết trồng cây",
        "không có việc gì khó", "chỉ sợ lòng không bền", "đào núi và lấp biển", "quyết chí ắt làm nên"
    ];

    const KB = ["1234567890-=", "qwertyuiop[]", "asdfghjkl;'", "zxcvbnm,./"];
    let curL = 1, words = [], curIdx = 0, errors = 0, startTime = null, isCompiling = false;

    function init() {
        // Tạo danh sách bài tập bên Sidebar
        const list = document.getElementById('ls-list');
        DATA.forEach((d, i) => {
            const item = document.createElement('div');
            item.className = 'ls-item'; item.id = `ls-${i+1}`;
            item.innerHTML = `<span>Bài ${i+1}</span><small id="score-${i+1}">--%</small>`;
            item.onclick = () => loadLesson(i+1); list.appendChild(item);
        });

        // Tạo bàn phím ảo (Tay)
        const kb = document.getElementById('keyboard');
        KB.forEach(row => {
            const r = document.createElement('div'); r.className = 'kb-row';
            row.split('').forEach(k => { r.innerHTML += `<div class="key" id="k-${k}">${k.toUpperCase()}</div>`; });
            kb.appendChild(r);
        });
        kb.innerHTML += `<div class="kb-row"><div class="key space" id="k-space">SPACE</div></div>`;

        loadLesson(1);
        setupLogic();
    }

    function setupLogic() {
        const input = document.getElementById('hidden-input');
        
        input.addEventListener('compositionstart', () => { isCompiling = true; });
        input.addEventListener('compositionend', () => { isCompiling = false; });

        input.oninput = () => {
            if (isCompiling) return;
            if (!startTime) startTime = new Date();
            
            const val = input.value;
            const target = words[curIdx].normalize('NFC');

            if (curL <= 3) { // Chế độ gõ phím đơn
                const typed = val.slice(-1).toLowerCase();
                if (typed === target.toLowerCase()) {
                    document.getElementById(`w-${curIdx}`).className = 'word ok';
                    curIdx++; input.value = "";
                    checkEnd();
                } else if (val.length > 0) {
                    errors++;
                    input.value = "";
                }
            } else { // Chế độ gõ từ
                if (val.endsWith(' ')) {
                    const typedWord = val.trim().normalize('NFC');
                    const el = document.getElementById(`w-${curIdx}`);
                    if (typedWord === target) el.className = 'word ok';
                    else { el.className = 'word err'; errors++; }
                    curIdx++; input.value = "";
                    checkEnd();
                }
            }
        };
        document.body.onclick = () => input.focus();
    }

    function loadLesson(id) {
        curL = id; curIdx = 0; errors = 0; startTime = null;
        document.getElementById('result-panel').style.display = 'none';
        document.querySelectorAll('.ls-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`ls-${id}`).classList.add('active');
        
        const mode = document.getElementById('mode-label');
        mode.innerText = id <= 3 ? "CHẾ ĐỘ: LUYỆN PHÍM" : "CHẾ ĐỘ: GÕ TIẾNG VIỆT";
        mode.style.color = id <= 3 ? "var(--danger)" : "var(--success)";

        const rawText = DATA[id-1];
        words = (id <= 3) ? rawText.split('') : rawText.split(' ');
        
        const disp = document.getElementById('display');
        disp.innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w === ' ' ? '&nbsp;' : w}</span>`).join('');
        
        updateHighlights();
    }

    function updateHighlights() {
        document.querySelectorAll('.word, .key').forEach(el => el.classList.remove('active'));
        if (curIdx >= words.length) return;

        const currentWordEl = document.getElementById(`w-${curIdx}`);
        currentWordEl.classList.add('active');

        const nextChar = words[curIdx][0].toLowerCase();
        const keyEl = document.getElementById(nextChar === ' ' ? 'k-space' : `k-${nextChar}`);
        if (keyEl) keyEl.classList.add('active');
        
        // Cập nhật thông số thời gian thực
        if (startTime) {
            const min = (new Date() - startTime) / 60000;
            document.getElementById('wpm').innerText = Math.round((curIdx / 5) / min) || 0;
            const accuracy = Math.round(((curIdx - errors) / (curIdx || 1)) * 100);
            document.getElementById('acc').innerText = Math.max(0, accuracy) + "%";
        }
    }

    function checkEnd() {
        if (curIdx >= words.length) {
            const finalAcc = Math.round(((words.length - errors) / words.length) * 100);
            document.getElementById('score-details').innerHTML = `Tốc độ: <b>${document.getElementById('wpm').innerText} WPM</b><br>Chính xác: <b>${finalAcc}%</b>`;
            document.getElementById('result-panel').style.display = 'block';
            document.getElementById(`score-${curL}`).innerText = finalAcc + "%";
        } else {
            updateHighlights();
        }
    }

    function nextLesson() {
        if (curL < DATA.length) loadLesson(curL + 1);
        else loadLesson(1);
    }

    window.onload = init;
</script>
</body>
</html>
