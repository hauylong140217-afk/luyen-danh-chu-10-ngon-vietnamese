<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện đánh chữ 10 ngón</title>
    <style>
        :root {
            --bg: #050505; --panel: #111; --accent: #00f2ff;
            --success: #00ff88; --danger: #ff0044; --text: #e0e0e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body {
            font-family: 'Fira Code', monospace; background: var(--bg);
            color: var(--text); display: flex; height: 100vh;
        }

        /* ARCHITECTURE: LAYOUT OVERVIEW */
        .sidebar { width: 300px; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .viewport { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        /* HEATMAP & STATS SYSTEM */
        .dashboard { height: 120px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-around; padding: 0 50px; background: rgba(0,0,0,0.5); }
        .stat-box { position: relative; text-align: center; }
        .stat-box canvas { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); opacity: 0.3; }
        .stat-val { font-size: 32px; font-weight: 900; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .stat-lbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 2px; }

        /* TYPING ENGINE VISUALS */
        .engine-room { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 50px; }
        .text-stream {
            width: 80%; max-width: 1100px; padding: 60px; background: #0a0a0a;
            border-radius: 4px; border: 1px solid #1a1a1a; position: relative;
        }
        .word-node { display: inline-flex; margin-right: 15px; margin-bottom: 10px; transition: 0.3s; }
        .char-node { font-size: 42px; color: #333; position: relative; transition: 0.1s; }
        .char-node.active { color: #fff; text-shadow: 0 0 15px #fff; }
        .char-node.active::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 3px; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .char-node.passed { color: #666; }
        .char-node.error { color: #fff; background: var(--danger); box-shadow: 0 0 20px var(--danger); border-radius: 2px; }

        /* VIRTUAL MECHANICAL KEYBOARD */
        .mech-kb { background: #000; padding: 30px; border-radius: 8px; border: 2px solid #111; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .kb-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .key {
            width: 55px; height: 55px; background: #0f0f0f; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #444; border-radius: 4px;
            transition: 0.05s; position: relative; border-bottom: 4px solid #000;
        }
        .key.pressed { background: var(--accent); color: #000; transform: translateY(2px); border-bottom-width: 1px; box-shadow: 0 0 20px var(--accent); }
        .key.error-flash { background: var(--danger) !important; color: #fff !important; transform: translateY(2px); border-bottom-width: 1px; box-shadow: 0 0 30px var(--danger); }
        .key.space { width: 350px; }

        /* OVERLAYS */
        .matrix-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.05; pointer-events: none; }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div style="padding:30px; border-bottom:1px solid #222; text-align:center;">
        <h2 style="font-size:16px; letter-spacing:4px; color:var(--accent)">SYSTEM v4.0</h2>
    </div>
    <div id="lesson-grid" style="flex:1; overflow-y:auto; padding:10px;"></div>
</aside>

<main class="viewport">
    <canvas id="matrix" class="matrix-bg"></canvas>
    
    <div class="dashboard">
        <div class="stat-box"><span class="stat-val" id="wpm-display">00</span><br><span class="stat-lbl">WPM Speed</span></div>
        <div class="stat-box"><span class="stat-val" id="acc-display">0%</span><br><span class="stat-lbl">Accuracy</span></div>
        <div class="stat-box"><span class="stat-val" id="streak-display">0</span><br><span class="stat-lbl">Best Streak</span></div>
    </div>

    <div class="engine-room">
        <div id="mode-indicator" style="font-size:12px; color:var(--accent); font-weight:bold;">INITIALIZING...</div>
        
        <div class="text-stream" id="text-stream"></div>

        <div class="mech-kb" id="keyboard"></div>
    </div>
</main>

<input type="text" id="core-input" style="position:fixed; top:-1000px" autocomplete="off">

<script>
/** * TYPING ENGINE ARCHITECTURE - 10,000 LINE SCALE
 * Logic được thiết kế theo dạng Module hóa (Module-based Logic)
 */

class TypingEngine {
    constructor() {
        this.data = [
            "asdf jkl; asdf jkl;", "aaaa ssss dddd ffff", "jjjj kkkk llll ;;;;", "má mà mả mã mạ",
            "có công mài sắt có ngày nên kim", "học đi đôi với hành", "tiên học lễ hậu học văn",
            "ăn quả nhớ kẻ trồng cây", "uống nước nhớ nguồn", "lá lành đùm lá rách",
            "bầu ơi thương lấy bí cùng", "một cây làm chẳng nên non", "có chí thì nên",
            "tốt gỗ hơn tốt nước sơn", "đói cho sạch rách cho thơm", "thương người như thể thương thân",
            "kiến tha lâu cũng đầy tổ", "hầy không tày học bạn", "không thầy đố mày làm nên",
            "công cha như núi thái sơn", "nghĩa mẹ như nước trong nguồn", "gần mực thì đen gần đèn thì sáng",
            "ăn chậm nhai kỹ", "học một biết mười", "thời gian là vàng bạc", "lời chào cao hơn mâm cỗ",
            "một con ngựa đau cả tàu bỏ cỏ", "đoàn kết là sức mạnh", "sức khỏe là vốn quý nhất",
            "đi một ngày đàng học một sàng khôn", "cái nết đánh chết cái đẹp", "chậm mà chắc",
            "nhập gia tùy tục", "nói đi đôi với làm", "tấc đất tấc vàng", "chân cứng đá mềm",
            "lửa thử vàng gian nan thử sức", "gieo gió gặt bão", "kính trên nhường dưới",
            "uống nước nhớ người đào giếng", "luyện tay mỗi ngày", "kỹ năng gõ mười ngón",
            "kiên trì sẽ thành công", "làm việc có kế hoạch", "đam mê dẫn lối", "tập trung là chìa khóa",
            "sáng tạo không ngừng", "hành trình vạn dặm bắt đầu từ bước chân", "thất bại là mẹ thành công",
            "đừng bao giờ bỏ cuộc", "vượt qua giới hạn bản thân", "không thầy đố mày làm nên công ơn",
            "tri thức là sức mạnh", "đường tuy ngắn không đi không đến việc tuy nhỏ không làm không xong"
        ];
        this.currentLesson = 1;
        this.words = [];
        this.wordIndex = 0;
        this.errors = 0;
        this.isCompiling = false;
        this.startTime = null;
        this.streak = 0;
        this.maxStreak = 0;
        
        this.init();
    }

    init() {
        this.renderKeyboard();
        this.renderLessons();
        this.loadLesson(1);
        this.bindEvents();
        this.initMatrix();
    }

    renderLessons() {
        const grid = document.getElementById('lesson-grid');
        this.data.forEach((_, i) => {
            const btn = document.createElement('div');
            btn.style = `padding:15px; margin-bottom:5px; background:#1a1a1a; cursor:pointer; font-size:12px; border-left:2px solid transparent`;
            btn.innerText = `LEVEL ${String(i+1).padStart(2, '0')}`;
            btn.onclick = () => this.loadLesson(i+1);
            btn.id = `ls-btn-${i+1}`;
            grid.appendChild(btn);
        });
    }

    renderKeyboard() {
        const layout = ["1234567890-=", "qwertyuiop[]", "asdfghjkl;'", "zxcvbnm,./"];
        const kb = document.getElementById('keyboard');
        layout.forEach(row => {
            const rDiv = document.createElement('div'); rDiv.className = 'kb-row';
            row.split('').forEach(key => {
                rDiv.innerHTML += `<div class="key" id="k-${key}">${key.toUpperCase()}</div>`;
            });
            kb.appendChild(rDiv);
        });
        kb.innerHTML += `<div class="kb-row"><div class="key space" id="k-space">SPACE DISCIPLINE</div></div>`;
    }

    loadLesson(id) {
        this.currentLesson = id;
        this.wordIndex = 0;
        this.errors = 0;
        this.startTime = null;
        this.streak = 0;
        
        document.querySelectorAll('[id^="ls-btn-"]').forEach(el => el.style.borderColor = 'transparent');
        document.getElementById(`ls-btn-${id}`).style.borderColor = 'var(--accent)';
        
        const raw = this.data[id-1].toLowerCase();
        this.words = (id <= 4) ? raw.split('') : raw.split(' ');
        
        const stream = document.getElementById('text-stream');
        stream.innerHTML = this.words.map((w, i) => {
            if(id <= 4) return `<span class="char-node" id="c-${i}">${w === ' ' ? '&nbsp;' : w}</span>`;
            return `<div class="word-node" id="w-${i}">${w.split('').map((c, ci) => `<span class="char-node" id="c-${i}-${ci}">${c}</span>`).join('')}</div>`;
        }).join(id <= 4 ? '' : '<span>&nbsp;</span>');

        document.getElementById('mode-indicator').innerText = id <= 4 ? "MODE: ALPHA-LATIN (OFF UNIKEY)" : "MODE: VIETNAMESE TELEX (ON UNIKEY)";
        this.updateHighlights();
    }

    bindEvents() {
        const input = document.getElementById('core-input');
        
        input.addEventListener('compositionstart', () => { this.isCompiling = true; });
        input.addEventListener('compositionend', () => { this.isCompiling = false; });
        
        input.onkeydown = (e) => {
            if(e.key === 'Backspace') {
                this.shakeScreen();
                e.preventDefault();
                return false;
            }
        };

        input.oninput = (e) => {
            if(this.isCompiling) return;
            if(!this.startTime) this.startTime = new Date();
            
            const val = input.value;
            if(!val) return;

            const target = this.words[this.wordIndex];

            if(this.currentLesson <= 4) {
                const typed = val.slice(-1);
                const el = document.getElementById(`c-${this.wordIndex}`);
                if(typed === target) {
                    el.className = 'char-node passed';
                    this.streak++;
                    this.triggerKeyEffect(typed, true);
                } else {
                    el.className = 'char-node error';
                    this.errors++;
                    this.streak = 0;
                    this.triggerKeyEffect(typed, false);
                }
                this.wordIndex++;
                input.value = "";
                this.processStep();
            } else {
                if(val.endsWith(' ')) {
                    const typedWord = val.trim();
                    const wEl = document.getElementById(`w-${this.wordIndex}`);
                    if(typedWord === target) {
                        wEl.querySelectorAll('.char-node').forEach(n => n.className = 'char-node passed');
                        this.streak += target.length;
                    } else {
                        wEl.querySelectorAll('.char-node').forEach(n => n.className = 'char-node error');
                        this.errors++;
                        this.streak = 0;
                    }
                    this.wordIndex++;
                    input.value = "";
                    this.processStep();
                }
            }
        };

        document.body.onclick = () => input.focus();
    }

    processStep() {
        this.updateStats();
        if(this.wordIndex >= this.words.length) {
            this.showReport();
        } else {
            this.updateHighlights();
        }
    }

    updateHighlights() {
        document.querySelectorAll('.char-node').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.key').forEach(k => k.classList.remove('pressed'));
        
        let targetChar = "";
        if(this.currentLesson <= 4) {
            const next = document.getElementById(`c-${this.wordIndex}`);
            if(next) { next.classList.add('active'); targetChar = this.words[this.wordIndex]; }
        } else {
            const nextW = document.getElementById(`w-${this.wordIndex}`);
            if(nextW) { 
                nextW.querySelector('.char-node').classList.add('active');
                targetChar = this.words[this.wordIndex][0];
            }
        }
        const key = document.getElementById(targetChar === ' ' ? 'k-space' : `k-${targetChar}`);
        if(key) key.classList.add('pressed');
    }

    updateStats() {
        if(!this.startTime) return;
        const time = (new Date() - this.startTime) / 60000;
        const wpm = Math.round((this.wordIndex / 5) / time) || 0;
        const acc = Math.round(((this.wordIndex - this.errors) / this.wordIndex) * 100) || 100;
        
        if(this.streak > this.maxStreak) this.maxStreak = this.streak;
        
        document.getElementById('wpm-display').innerText = String(wpm).padStart(2, '0');
        document.getElementById('acc-display').innerText = acc + "%";
        document.getElementById('streak-display').innerText = this.maxStreak;
    }

    triggerKeyEffect(key, success) {
        const id = key === ' ' ? 'k-space' : `k-${key.toLowerCase()}`;
        const el = document.getElementById(id);
        if(el) {
            const cls = success ? 'pressed' : 'error-flash';
            el.classList.add(cls);
            setTimeout(() => el.classList.remove(cls), 600);
        }
    }

    shakeScreen() {
        const vp = document.querySelector('.viewport');
        vp.style.animation = 'shake 0.1s 3';
        setTimeout(() => vp.style.animation = '', 300);
    }

    initMatrix() {
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const drops = Array(Math.floor(canvas.width/20)).fill(1);
        
        setInterval(() => {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    }

    showReport() {
        alert(`HOÀN THÀNH LEVEL ${this.currentLesson}\nLỗi: ${this.errors}\nChuỗi gõ liên tiếp tốt nhất: ${this.maxStreak}`);
        this.loadLesson(this.currentLesson + 1);
    }
}

// KHỞI CHẠY HỆ THỐNG
window.onload = () => new TypingEngine();
</script>

<style>
@keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    40% { transform: translate(3px, 2px) rotate(0deg); }
    60% { transform: translate(-3px, 1px) rotate(-1deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    100% { transform: translate(1px, -2px) rotate(0deg); }
}
</style>
</body>
</html>
