<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện Gõ 10 Ngón - Hà Uy Long & Gemini</title>
    <style>
        :root { --bg: #f0f2f5; --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #343a40; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 200px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .sidebar-header { padding: 15px; font-weight: bold; color: var(--primary); border-bottom: 1px solid #eee; text-align: center; }
        .nav-item { padding: 10px 20px; color: #444; cursor: pointer; border-left: 4px solid transparent; font-size: 14px; }
        .nav-item:hover { background: #f8f9fa; }
        .nav-item.active { background: #e7f1ff; border-left-color: var(--primary); font-weight: bold; color: var(--primary); }

        /* Container chính */
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        .content-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 15px; padding-bottom: 250px; }

        /* GIỚI THIỆU: HÀ UY LONG & GEMINI */
        .intro-section { width: 100%; max-width: 800px; text-align: center; margin-bottom: 10px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        .intro-section h2 { margin: 0; color: var(--dark); letter-spacing: 1px; }
        .intro-section p { font-size: 15px; color: #555; margin: 10px 0 0 0; font-style: italic; }

        .note-box { width: 100%; max-width: 800px; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 10px; font-size: 14px; transition: 0.3s; }
        .note-unikey { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .note-v { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; font-size: 24px !important; }

        .guide-container { width: 100%; max-width: 800px; margin-bottom: 15px; flex-shrink: 0; }
        .guide-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #333; }
        .guide-table td { border: 1px solid #333; padding: 6px; text-align: center; font-weight: bold; font-size: 13px; }
        .red-key { color: var(--danger); font-size: 16px; }

        .typing-box { width: 100%; max-width: 800px; text-align: center; margin: 10px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 5px; }
        .char { font-family: 'Consolas', monospace; font-size: 28px; color: #ccc; padding: 2px 4px; border-radius: 4px; transition: 0.1s; }
        .char.current { color: #000; border-bottom: 4px solid var(--primary); background: #fff9c4; }
        .char.correct { color: var(--success); }
        .char.wrong { color: var(--danger); background: #ffebee; }

        .keyboard-wrapper { background: #dee2e6; padding: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; border-top: 2px solid #bbb; position: absolute; bottom: 0; left: 0; z-index: 10; }
        .kb-row { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; }
        .key { width: 40px; height: 40px; background: white; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #bbb; font-size: 14px; }
        .key.active { background: var(--success) !important; color: white; }
        .key.space { width: 220px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .result-box { background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .btn-next { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">LỘ TRÌNH 60 BÀI</div>
        <div id="lesson-list"></div>
    </div>

    <div class="main">
        <div class="content-area" id="scroll-area">
            <div class="intro-section">
                <h2>Hệ Thống Luyện Gõ 10 Ngón Chuyên Nghiệp</h2>
                <p>Tác giả: <b>Hà Uy Long & AI Gemini</b> (Phiên bản 2026)</p>
            </div>

            <div id="dynamic-note" class="note-box note-unikey">
                ⚠️ LƯU Ý: HÃY CHUYỂN UNIKEY SANG CHẾ ĐỘ TIẾNG ANH (CHỮ E)
            </div>

            <div class="guide-container">
                <table class="guide-table">
                    <tr>
                        <td rowspan="2" style="background: #eee; width: 70px;">TELEX</td>
                        <td>Sắc (S)</td><td>Huyền (F)</td><td>Hỏi (R)</td><td>Ngã (X)</td><td>Nặng (J)</td>
                    </tr>
                    <tr class="red-key">
                        <td>S</td><td>F</td><td>R</td><td>X</td><td>J</td>
                    </tr>
                    <tr>
                        <td rowspan="2" style="background: #eee;">VNI</td>
                        <td>Sắc (1)</td><td>Huyền (2)</td><td>Hỏi (3)</td><td>Ngã (4)</td><td>Nặng (5)</td>
                    </tr>
                    <tr class="red-key">
                        <td>1</td><td>2</td><td>3</td><td>4</td><td>5</td>
                    </tr>
                </table>
            </div>

            <div class="typing-box" id="target-text"></div>
        </div>

        <div class="keyboard-wrapper">
            <div class="kb-row" id="r1"></div>
            <div class="kb-row" id="r2"></div>
            <div class="kb-row" id="r3"></div>
            <div class="kb-row"><div class="key space" id="k-space">SPACE</div></div>
        </div>
    </div>

    <div class="modal" id="modal-res">
        <div class="result-box">
            <h2 id="modal-title">Hoàn thành!</h2>
            <p id="stats-info" style="font-size: 18px;"></p>
            <button class="btn-next" id="btn-next-action" onclick="handleNextStep()">Tiếp tục</button>
        </div>
    </div>

    <input type="text" id="keyboard-input" style="position: absolute; opacity: 0;">

    <script>
        const lessons = {
            1: "aaaa ssss dddd ffff jjjj kkkk llll ;;;; aaaa ssss dddd ffff jjjj kkkk llll ;;;;",
            2: "asdf jkl; asdf jkl; asdf jkl; asdf jkl; asdf jkl; asdf jkl; asdf jkl;",
            3: "aa ss dd ff jj kk ll ;; af jk sd l; aa ss dd ff jj kk ll ;; af jk sd l;",
            4: "gh gh gh gh ty ty ty ty ur ur ur ur ei ei ei ei wo wo wo wo qp qp qp qp",
            // Các bài 5-59 là nội dung luyện tập tiếng Việt
            5: "má mà mả mã mạ cá cà cả mã mạ má mà mả mã mạ cá cà cả mã mạ",
            // ... (Nội dung các bài trung gian)
            59: "sự kiên nhẫn là yếu tố cốt lõi giúp bạn vượt qua mọi rào cản để chạm đến đích đến cuối cùng",
            // Bài 60: Bài kết thúc thực tế
            60: "chúc mừng bạn đã hoàn thành xuất sắc sáu mươi bài luyện tập luyện gõ mười ngón chuyên nghiệp cùng hà uy long và ai gemini",
            61: "dự phòng 1",
            62: "dự phòng 2"
        };

        // Điền các bài còn lại từ 6-58
        const quotes = [
            "con cò bé bé nó đậu cành tre đi không hỏi mẹ biết đi đường nào",
            "học thầy không tày học bạn tiên học lễ hậu học văn kiến tha lâu cũng đầy tổ",
            "uống nước nhớ nguồn ăn quả nhớ kẻ trồng cây một cây làm chẳng nên non ba cây chụm lại",
            "đường đời nhiều ngã rẽ quan trọng là ta chọn đi con đường nào cho đúng đắn và tự tin",
            "mùa xuân sang có hoa anh đào màu sắc tươi thắm đón chào một năm mới bình an",
            "trong đầm gì đẹp bằng sen lá xanh bông trắng lại chen nhị vàng nhị vàng bông trắng lá xanh",
            "có công mài sắt có ngày nên kim ai ơi chớ bỏ công lao học tập để xây dựng tương lai",
            "con người cần có lòng vị tha và sự thấu hiểu để cuộc sống này trở nên tốt đẹp hơn",
            "kiến thức là sức mạnh nhưng vận dụng kiến thức mới là chìa khóa của sự thành công",
            "mọi khó khăn chỉ là thử thách giúp chúng ta rèn luyện bản lĩnh và ý chí kiên cường",
            "trời xanh mây trắng nắng vàng một ngày mới bắt đầu với thật nhiều năng lượng tích cực",
            "đừng bao giờ từ bỏ ước mơ vì đó chính là động lực để bạn tiến về phía trước mỗi ngày",
            "kỹ năng gõ phím mười ngón sẽ giúp bạn làm việc nhanh hơn và chuyên nghiệp hơn rất nhiều",
            "thất bại là mẹ thành công hãy luôn kiên trì theo đuổi đam mê đến tận cùng của con đường",
            "thời gian là vàng bạc đừng lãng phí từng giây phút quý giá vào những việc vô bổ",
            "gia đình là nơi bình yên nhất để trở về sau những mệt mỏi của cuộc sống đời thường",
            "lòng biết ơn là cội nguồn của hạnh phúc hãy trân trọng những gì bạn đang có hôm nay",
            "một nụ cười bằng mười thang thuốc bổ hãy luôn giữ tinh thần lạc quan trong mọi hoàn cảnh",
            "không có gì là không thể nếu chúng ta thực sự nỗ lực và tin tưởng vào bản thân mình",
            "sách là kho tàng tri thức quý giá của nhân loại hãy duy trì thói quen đọc sách mỗi ngày",
            "âm nhạc làm cho tâm hồn ta trở nên phong phú và yêu đời hơn sau mỗi giờ làm việc căng thẳng",
            "tình bạn chân thành là món quà tuyệt vời nhất mà cuộc sống đã ban tặng cho mỗi chúng ta",
            "hãy sống sao cho xứng đáng với những gì cha mẹ đã hy sinh và kỳ vọng vào chúng ta",
            "mỗi ngày là một cơ hội mới để bạn trở thành phiên bản tốt hơn của chính mình ngày hôm qua",
            "trung thực là đức tính quý báu nhất của con người giúp chúng ta nhận được sự tin tưởng",
            "sự tử tế là ngôn ngữ mà người điếc có thể nghe và người mù có thể nhìn thấy rõ ràng",
            "đừng so sánh mình với bất kỳ ai khác hãy chỉ so sánh mình với chính mình của ngày cũ",
            "kỷ luật là cầu nối giữa mục tiêu và thành tựu nếu thiếu kỷ luật bạn khó lòng thành công",
            "kiên trì là chìa khóa mở cánh cửa của mọi thành công dù con đường phía trước đầy gian truân",
            "yêu thương cho đi là yêu thương còn mãi hãy lan tỏa sự ấm áp đến mọi người xung quanh",
            "thái độ quan trọng hơn trình độ hãy luôn giữ cho mình một thái độ cầu thị và ham học hỏi",
            "cuộc sống không phải để tìm thấy chính mình mà là để tạo ra chính bản thân mình theo cách riêng",
            "đam mê là ngọn lửa thắp sáng con đường đi tới thành công của mỗi con người trong cuộc đời",
            "tự do không phải là làm những gì mình muốn mà là không phải làm những gì mình không muốn",
            "hãy học cách chấp nhận những điều không thể thay đổi và nỗ lực thay đổi những điều có thể",
            "thành công không phải là điểm dừng cuối cùng mà là cả một hành trình trải nghiệm đầy thú vị",
            "sức khỏe là tài sản vô giá nhất của con người hãy chăm sóc bản thân thật tốt mỗi ngày",
            "đừng chờ đợi thời cơ thuận lợi mà hãy tự mình tạo ra thời cơ để nắm bắt thành công",
            "sự im lặng đôi khi là câu trả lời tốt nhất cho những tranh cãi không cần thiết trong đời",
            "hành trình vạn dặm luôn bắt đầu từ những bước chân nhỏ bé đầu tiên đầy kiên định",
            "hãy làm việc trong im lặng và để sự thành công của bạn lên tiếng thay cho những lời nói",
            "không có kho tàng nào quý giá bằng trí tuệ và không có sự nghèo đói nào đáng sợ bằng thiếu hiểu biết",
            "lòng can đảm không phải là không sợ hãi mà là đối mặt với nỗi sợ để vượt qua nó mạnh mẽ",
            "cuộc đời như một cuốn sách người không đi du lịch thì chỉ mới đọc được trang đầu tiên",
            "sáng tạo là khả năng nhìn thấy những điều cũ dưới một góc nhìn hoàn toàn mới mẻ và khác biệt",
            "hạnh phúc không phải là có tất cả những gì bạn muốn mà là trân trọng những gì bạn đang có",
            "hãy tin rằng bạn có thể làm được và bạn đã đi được nửa chặng đường đến với thành công",
            "sự khiêm tốn là đỉnh cao của sự hiểu biết và là biểu hiện của một tâm hồn cao thượng",
            "tương lai thuộc về những ai tin tưởng vào vẻ đẹp của những ước mơ mà họ đang ấp ủ",
            "đừng nói về những kế hoạch của bạn hãy cho họ thấy kết quả sau khi bạn đã thực hiện chúng",
            "giáo dục là vũ khí mạnh nhất mà bạn có thể sử dụng để thay đổi cả thế giới này tốt đẹp hơn",
            "biết người là thông minh biết mình là thông thái làm chủ người là quyền lực làm chủ mình là sức mạnh",
            "đỉnh núi nào cũng có đường lên và mọi khó khăn đều có cách giải quyết nếu ta đủ bình tĩnh"
        ];
        quotes.forEach((q, i) => { if(!lessons[i+6]) lessons[i+6] = q; });

        let currentIdx = 0, currentLesson = 1, errors = 0, wordsArray = [];

        // Chỉ tạo 60 bài trên thanh Sidebar
        const list = document.getElementById('lesson-list');
        for(let i=1; i<=60; i++) {
            const div = document.createElement('div');
            div.className = 'nav-item'; div.id = `nav-${i}`;
            div.innerText = `Bài học ${i}`;
            div.onclick = () => loadLesson(i);
            list.appendChild(div);
        }

        const rows = ["qwertyuiop", "asdfghjkl;", "zxcvbnm"];
        rows.forEach((str, idx) => {
            const container = document.getElementById(`r${idx+1}`);
            str.split('').forEach(char => {
                const key = document.createElement('div');
                key.className = 'key'; key.id = `key-${char}`;
                key.innerText = char.toUpperCase();
                container.appendChild(key);
            });
        });

        function loadLesson(id) {
            currentLesson = id;
            let rawText = lessons[id] || "Đang tải bài tập...";
            currentIdx = 0; errors = 0;
            
            const noteEl = document.getElementById('dynamic-note');
            if (id >= 5) {
                noteEl.innerText = "⚠️ LƯU Ý: HÃY CHUYỂN UNIKEY SANG CHẾ ĐỘ TIẾNG VIỆT (CHỮ V)";
                noteEl.className = "note-box note-v";
            } else {
                noteEl.innerText = "⚠️ LƯU Ý: HÃY CHUYỂN UNIKEY SANG CHẾ ĐỘ TIẾNG ANH (CHỮ E)";
                noteEl.className = "note-box note-unikey";
            }

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${id}`);
            if(activeNav) activeNav.classList.add('active');
            document.getElementById('modal-res').style.display = 'none';

            const display = document.getElementById('target-text');
            if (id >= 5) {
                wordsArray = rawText.split(' ');
                display.innerHTML = wordsArray.map((w, i) => `<span class="char" id="char-${i}">${w}</span>`).join('<span>&nbsp;</span>');
            } else {
                wordsArray = rawText.split('');
                display.innerHTML = wordsArray.map((c, i) => `<span class="char" id="char-${i}">${c === ' ' ? '&nbsp;' : c}</span>`).join('');
            }
            updateState();
            document.getElementById('keyboard-input').focus();
        }

        function updateState() {
            document.querySelectorAll('.char').forEach(el => el.classList.remove('current'));
            document.querySelectorAll('.key').forEach(el => el.classList.remove('active'));

            const activeChar = document.getElementById(`char-${currentIdx}`);
            if(!activeChar) return;
            activeChar.classList.add('current');
            activeChar.scrollIntoView({ behavior: 'smooth', block: 'center' });

            if (currentLesson < 5) {
                const char = wordsArray[currentIdx].toLowerCase();
                const keyEl = document.getElementById(char === ' ' ? 'k-space' : `key-${char}`);
                if(keyEl) keyEl.classList.add('active');
            }
        }

        document.getElementById('keyboard-input').addEventListener('keydown', (e) => {
            if (currentLesson >= 5 && e.key === ' ') {
                e.preventDefault();
                const input = e.target;
                const typedWord = input.value.trim();
                if(!typedWord) return;

                const charEl = document.getElementById(`char-${currentIdx}`);
                if (typedWord === wordsArray[currentIdx]) {
                    charEl.className = 'char correct';
                } else {
                    charEl.className = 'char wrong';
                    errors++;
                }
                currentIdx++;
                input.value = "";
                if (currentIdx < wordsArray.length) updateState(); else finish();
            }
        });

        document.getElementById('keyboard-input').addEventListener('input', (e) => {
            if (currentLesson < 5) {
                const typed = e.target.value.slice(-1);
                const target = wordsArray[currentIdx];
                const charEl = document.getElementById(`char-${currentIdx}`);
                if(typed === target || (target === ' ' && typed === ' ')) {
                    charEl.className = 'char correct';
                    currentIdx++;
                } else {
                    charEl.className = 'char wrong';
                    errors++;
                }
                if(currentIdx < wordsArray.length) updateState(); else finish();
                e.target.value = "";
            }
        });

        function finish() {
            const accuracy = Math.round(((wordsArray.length - errors) / wordsArray.length) * 100);
            document.getElementById('stats-info').innerHTML = `Độ chính xác: <b>${accuracy}%</b> | Lỗi: <b>${errors}</b>`;
            const btn = document.getElementById('btn-next-action');
            if (currentLesson === 60) {
                document.getElementById('modal-title').innerText = "🏆 XUẤT SẮC!";
                btn.innerText = "Luyện lại từ bài 1 ↺";
            } else {
                document.getElementById('modal-title').innerText = "Hoàn thành bài tập!";
                btn.innerText = "Tiếp theo ➔";
            }
            document.getElementById('modal-res').style.display = 'flex';
        }

        function handleNextStep() {
            if (currentLesson === 60) loadLesson(1); else loadLesson(currentLesson + 1);
        }

        window.onload = () => loadLesson(1);
        document.body.onclick = () => document.getElementById('keyboard-input').focus();
    </script>
</body>
</html>
