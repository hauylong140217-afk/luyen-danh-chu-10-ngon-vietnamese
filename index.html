<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Typing Master - High Contrast Edition</title>
    <style>
        :root {
            /* Tự động đảo màu theo hệ thống */
            --bg: #ffffff; --panel: #f1f5f9; --text: #0f172a;
            --primary: #0ea5e9; --sub-text: #64748b;
            --key-bg: #e2e8f0; --key-text: #1e293b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617; --panel: #1e293b; --text: #f8fafc;
                --primary: #38bdf8; --sub-text: #94a3b8;
                --key-bg: #334155; --key-text: #f8fafc;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            background: var(--bg); color: var(--text);
            display: flex; height: 100vh; transition: 0.3s;
        }

        /* SIDEBAR */
        .sidebar { width: 250px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .ls-list { flex: 1; overflow-y: auto; padding: 15px; }
        .ls-item {
            padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer;
            font-size: 14px; color: var(--sub-text); border: 1px solid transparent;
        }
        .ls-item.active { background: var(--primary); color: #fff; font-weight: bold; }

        /* MAIN AREA */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .stats { height: 60px; display: flex; align-items: center; justify-content: space-around; background: rgba(0,0,0,0.05); border-bottom: 1px solid rgba(0,0,0,0.1); }

        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; }
        
        /* CHỮ PHẢI THẬT RÕ */
        .display-area {
            width: 90%; max-width: 900px; padding: 50px; border-radius: 20px;
            background: var(--panel); display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .word { font-size: 42px; font-weight: 700; color: var(--sub-text); border-bottom: 5px solid transparent; }
        .word.active { color: var(--text); border-bottom-color: var(--primary); }
        .word.ok { color: #22c55e; }
        .word.err { color: #fff; background: #ef4444; border-radius: 6px; }

        /* ĐÔI TAY VÀ BÀN PHÍM */
        .hands-wrap { display: flex; align-items: flex-end; gap: 40px; }
        .hand-svg { width: 160px; height: 160px; fill: none; stroke: var(--sub-text); stroke-width: 1.5; opacity: 0.4; }
        .hand-svg.active { opacity: 1; stroke: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }
        .finger.hit { fill: var(--primary); stroke: var(--primary); }

        .kb { display: flex; flex-direction: column; gap: 5px; padding: 15px; background: rgba(0,0,0,0.1); border-radius: 12px; }
        .kb-row { display: flex; gap: 5px; justify-content: center; }
        .key {
            width: 48px; height: 48px; background: var(--key-bg); color: var(--key-text);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 14px; border-bottom: 4px solid rgba(0,0,0,0.2);
        }
        .key.active { background: var(--primary); color: #fff; transform: translateY(3px); border-bottom: none; }

        /* BẢNG ĐIỂM */
        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .score-card { background: var(--panel); padding: 50px; border-radius: 24px; text-align: center; color: var(--text); border: 2px solid var(--primary); }

        #hidden-input { position: fixed; top: -100px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding:20px; font-weight:bold; color:var(--primary)">TYPING MASTER</div>
    <div class="ls-list" id="ls-list"></div>
</div>

<div class="main">
    <div class="stats">
        <div>Tốc độ: <span id="wpm-val" style="color:var(--primary); font-weight:bold">0</span> WPM</div>
        <div>Chính xác: <span id="acc-val" style="color:var(--primary); font-weight:bold">0%</span></div>
    </div>

    <div class="content">
        <div class="display-area" id="display"></div>

        <div class="hands-wrap">
            <svg class="hand-svg" id="hand-l" viewBox="0 0 100 100">
                <path d="M10,60 Q5,30 15,30 T25,60" id="f-l5" class="finger"/> <path d="M25,50 Q20,15 35,15 T45,50" id="f-l4" class="finger"/> <path d="M45,40 Q45,5 55,5 T65,40" id="f-l3" class="finger"/>   <path d="M65,50 Q75,15 85,20 T80,55" id="f-l2" class="finger"/> <path d="M80,80 Q95,75 90,95" id="f-l1" class="finger"/>        </svg>

            <div class="kb" id="kb"></div>

            <svg class="hand-svg" id="hand-r" viewBox="0 0 100 100">
                <path d="M90,60 Q95,30 85,30 T75,60" id="f-r5" class="finger"/>
                <path d="M75,50 Q80,15 65,15 T55,50" id="f-r4" class="finger"/>
                <path d="M55,40 Q55,5 45,5 T35,40" id="f-r3" class="finger"/>
                <path d="M35,50 Q25,15 15,20 T20,55" id="f-r2" class="finger"/>
                <path d="M20,80 Q5,75 10,95" id="f-r1" class="finger"/>
            </svg>
        </div>
    </div>

    <div id="overlay">
        <div class="score-card">
            <h1 style="margin-bottom:20px">KẾT QUẢ</h1>
            <div id="final-stats" style="font-size: 24px; margin-bottom:30px"></div>
            <button onclick="nextL()" style="padding:15px 30px; cursor:pointer; background:var(--primary); border:none; border-radius:8px; color:#fff; font-weight:bold">BÀI TIẾP THEO ➔</button>
        </div>
    </div>
</div>

<input type="text" id="hidden-input" autofocus>

<script>
    const LESSONS = ["asdf jkl; asdf jkl;", "má mà mả mã mạ", "có công mài sắt có ngày nên kim", "uống nước nhớ nguồn"];
    const KB_LAYOUT = ["1234567890-=", "qwertyuiop[]", "asdfghjkl;'", "zxcvbnm,./"];
    const F_MAP = {
        'q':'f-l5','a':'f-l5','z':'f-l5','w':'f-l4','s':'f-l4','x':'f-l4','e':'f-l3','d':'f-l3','c':'f-l3','r':'f-l2','f':'f-l2','v':'f-l2','t':'f-l2','g':'f-l2','b':'f-l2',
        'y':'f-r2','h':'f-r2','n':'f-r2','u':'f-r2','j':'f-r2','m':'f-r2','i':'f-r3','k':'f-r3',',':'f-r3','o':'f-r4','l':'f-r4','.':'f-r4','p':'f-r5',';':'f-r5',' ':'f-r1'
    };

    let curL = 0, words = [], curIdx = 0, errs = 0, start = null, isIME = false;

    function init() {
        const list = document.getElementById('ls-list');
        LESSONS.forEach((l, i) => list.innerHTML += `<div class="ls-item" id="ls-${i}" onclick="loadL(${i})">Level ${i+1}</div>`);
        
        const kb = document.getElementById('kb');
        KB_LAYOUT.forEach(row => {
            const r = document.createElement('div'); r.className = 'kb-row';
            row.split('').forEach(k => r.innerHTML += `<div class="key" id="k-${k}">${k.toUpperCase()}</div>`);
            kb.appendChild(r);
        });
        kb.innerHTML += `<div class="kb-row"><div class="key" id="k-space" style="width:300px">SPACE</div></div>`;

        loadL(0);
        setupInput();
    }

    function setupInput() {
        const inp = document.getElementById('hidden-input');
        inp.addEventListener('compositionstart', () => isIME = true);
        inp.addEventListener('compositionend', () => isIME = false);

        inp.oninput = () => {
            if (isIME) return;
            if (!start) start = new Date();
            const val = inp.value;
            const target = words[curIdx].normalize('NFC');

            if (val.endsWith(' ') || (curIdx === words.length-1 && val.normalize('NFC') === target)) {
                const typed = val.trim().normalize('NFC');
                const el = document.getElementById(`w-${curIdx}`);
                if (typed === target) el.className = 'word ok';
                else { el.className = 'word err'; errs++; }
                curIdx++; inp.value = "";
                if (curIdx >= words.length) finish();
                else updateUI();
            }
        };
        document.body.onclick = () => inp.focus();
    }

    function loadL(idx) {
        curL = idx; curIdx = 0; errs = 0; start = null;
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.ls-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`ls-${idx}`).classList.add('active');
        words = LESSONS[idx].split(' ');
        document.getElementById('display').innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join(' ');
        updateUI();
    }

    function updateUI() {
        document.querySelectorAll('.word, .key, .finger, .hand-svg').forEach(el => el.classList.remove('active', 'hit'));
        const wEl = document.getElementById(`w-${curIdx}`);
        if (!wEl) return;
        wEl.classList.add('active');

        const char = words[curIdx][0].toLowerCase();
        const kEl = document.getElementById(char === ' ' ? 'k-space' : `k-${char}`);
        if (kEl) kEl.classList.add('active');

        const fId = F_MAP[char];
        if (fId) {
            document.getElementById(fId).classList.add('hit');
            document.getElementById(fId.startsWith('f-l') ? 'hand-l' : 'hand-r').classList.add('active');
        }
    }

    function finish() {
        const acc = Math.round(((words.length - errs) / words.length) * 100);
        document.getElementById('final-stats').innerHTML = `Độ chính xác: ${acc}%`;
        document.getElementById('overlay').style.display = 'flex';
    }

    function nextL() { loadL((curL + 1) % LESSONS.length); }

    window.onload = init;
</script>
</body>
</html>
