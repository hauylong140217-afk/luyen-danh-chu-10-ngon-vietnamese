<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Gõ 10 Ngón</title>
    <style>
        :root { --bg: #f1f5f9; --primary: #2563eb; --success: #16a34a; --danger: #ef4444; --sidebar-w: 85px; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: var(--sidebar-w); height: 100vh; background: #fff; border-right: 2px solid #e2e8f0; display: flex; flex-direction: column; }
        .view-all-btn { background: #1e293b; color: white; text-align: center; padding: 12px 0; font-size: 10px; font-weight: 800; cursor: pointer; }
        .lesson-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 0; text-align: center; color: #64748b; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 12px; font-weight: bold; }
        .nav-item.active { background: var(--primary); color: white; }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
        .progress-bar { width: 100%; height: 6px; background: #e2e8f0; position: fixed; top: 0; }
        .p-fill { height: 100%; background: var(--success); width: 0%; transition: 0.4s; }
        
        .intro-header { text-align: center; margin-bottom: 10px; }
        .intro-header h1 { margin: 0; font-size: 20px; color: #1e293b; }
        .author { font-size: 11px; font-weight: bold; color: var(--primary); }

        .app-body { flex: 1; width: 95%; max-width: 900px; display: flex; flex-direction: column; align-items: center; gap: 10px; }

        .display-box { width: 100%; background: white; border-radius: 12px; padding: 20px; min-height: 80px; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 5px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .char { font-family: 'Consolas', monospace; font-size: 26px; color: #cbd5e1; border-bottom: 3px solid transparent; }
        .char.current { color: #1e293b; border-bottom-color: var(--primary); background: #eff6ff; }
        .char.correct { color: #1e293b; }
        .char.wrong { color: white; background: var(--danger); border-radius: 4px; }

        .guide-container { width: 100%; display: flex; flex-direction: column; gap: 5px; }
        #unikey-note { text-align: center; font-weight: 800; font-size: 13px; padding: 8px; border-radius: 6px; }
        .note-e { color: var(--danger); background: #fee2e2; border: 1px solid var(--danger); }
        .note-v { color: var(--success); background: #dcfce7; border: 1px solid var(--success); }

        /* Bảng hướng dẫn đánh dấu - ĐÃ LƯỢC BỎ CHỮ CÓ MŨ */
        .telex-grid { display: flex; justify-content: center; gap: 15px; background: white; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
        .t-cell { font-size: 13px; text-align: center; color: #475569; }
        .t-cell b { color: var(--danger); font-size: 15px; }

        .kb-area { display: flex; align-items: flex-end; gap: 15px; padding: 10px; background: #fff; border-radius: 15px; border: 1px solid #cbd5e1; }
        .hand-svg { width: 90px; height: 110px; }
        .finger { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; }
        .finger.active { fill: var(--primary); stroke: var(--primary); }
        .kb-grid { display: flex; flex-direction: column; gap: 3px; background: #f1f5f9; padding: 5px; border-radius: 8px; }
        .kb-row { display: flex; gap: 3px; justify-content: center; }
        .key { min-width: 34px; height: 34px; background: white; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border-bottom: 2px solid #cbd5e1; }
        .key.active { background: var(--success); color: white; transform: translateY(1px); border-bottom-width: 1px; }
        .key.wrong-key { background: var(--danger) !important; color: white !important; border-bottom-color: #b91c1c !important; }
        .key.space { width: 180px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-box { background: white; padding: 25px; border-radius: 12px; text-align: center; border: 3px solid var(--primary); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="view-all-btn">BÀI TẬP</div>
    <div class="lesson-list" id="ls-list"></div>
</div>

<div class="main">
    <div class="progress-bar"><div class="p-fill" id="p-fill"></div></div>
    <div class="intro-header">
        <h1>Luyện Gõ 10 Ngón</h1>
        <div class="author">Tác giả: HÀ UY LONG</div>
    </div>
    
    <div class="app-body">
        <div class="display-box" id="display-box"></div>
        
        <div class="guide-container">
            <div id="unikey-note"></div>
            <div class="telex-grid">
                <div class="t-cell">Sắc: <b>s</b></div>
                <div class="t-cell">Huyền: <b>f</b></div>
                <div class="t-cell">Hỏi: <b>r</b></div>
                <div class="t-cell">Ngã: <b>x</b></div>
                <div class="t-cell">Nặng: <b>j</b></div>
            </div>
        </div>
        
        <div class="kb-area">
            <svg class="hand-svg" viewBox="0 0 100 120"><path id="f-l-5" class="finger" d="M10,80 C5,40 15,35 25,45 L25,80 Z" /><path id="f-l-4" class="finger" d="M28,75 C25,25 35,20 45,30 L45,75 Z" /><path id="f-l-3" class="finger" d="M48,70 C45,15 55,10 65,25 L65,75 Z" /><path id="f-l-2" class="finger" d="M68,75 C70,30 80,35 85,55 L80,85 Z" /><path id="f-l-1" class="finger" d="M85,90 C100,85 100,105 85,115 Z" /></svg>
            <div class="kb-grid" id="kb-grid"></div>
            <svg class="hand-svg" viewBox="0 0 100 120" style="transform: scaleX(-1);"><path id="f-r-5" class="finger" d="M10,80 C5,40 15,35 25,45 L25,80 Z" /><path id="f-r-4" class="finger" d="M28,75 C25,25 35,20 45,30 L45,75 Z" /><path id="f-r-3" class="finger" d="M48,70 C45,15 55,10 65,25 L65,75 Z" /><path id="f-r-2" class="finger" d="M68,75 C70,30 80,35 85,55 L80,85 Z" /><path id="f-r-1" class="finger" d="M85,90 C100,85 100,105 85,115 Z" /></svg>
        </div>
    </div>
</div>

<div class="modal" id="modal"><div class="modal-box"><h2 id="res-txt"></h2><p id="res-info"></p><button onclick="nextL()" style="padding:10px 20px; cursor:pointer;">TIẾP TỤC ➔</button></div></div>

<input type="text" id="in" style="position: absolute; opacity: 0;" autocomplete="off">

<script>
    const fMap = { '1':'l-5','q':'l-5','a':'l-5','z':'l-5','2':'l-4','w':'l-4','s':'l-4','x':'l-4','3':'l-3','e':'l-3','d':'l-3','c':'l-3','4':'l-2','r':'l-2','f':'l-2','v':'l-2','5':'l-2','t':'l-2','g':'l-2','b':'l-2','6':'r-2','y':'r-2','h':'r-2','n':'r-2','7':'r-2','u':'r-2','j':'r-2','m':'r-2','8':'r-3','i':'r-3','k':'r-3',',':'r-3','9':'r-4','o':'r-4','l':'r-4','.':'r-4','0':'r-5','p':'r-5',';':'r-5','/':'r-5',' ':'l-1' };
    const sentenceDB = ["asdf jkl; asdf jkl;", "aaaa ssss dddd ffff", "jjjj kkkk llll ;;;;", "má mà mả mã mạ", "Có công mài sắt có ngày nên kim", "Học đi đôi với hành", "Tiên học lễ hậu học văn", "Ăn quả nhớ kẻ trồng cây", "Uống nước nhớ nguồn", "Lá lành đùm lá rách", "Bầu ơi thương lấy bí cùng", "Một cây làm chẳng nên non", "Có chí thì nên", "Tốt gỗ hơn tốt nước sơn", "Đói cho sạch rách cho thơm", "Thương người như thể thương thân", "Kiến tha lâu cũng đầy tổ", "Hầy không tày học bạn", "Không thầy đố mày làm nên", "Công cha như núi Thái Sơn", "Nghĩa mẹ như nước trong nguồn", "Gần mực thì đen gần đèn thì sáng", "Ăn chậm nhai kỹ", "Học một biết mười", "Thời gian là vàng bạc", "Lời chào cao hơn mâm cỗ", "Một con ngựa đau cả tàu bỏ cỏ", "Đoàn kết là sức mạnh", "Sức khỏe là vốn quý nhất", "Đi một ngày đàng học một sàng khôn", "Cái nết đánh chết cái đẹp", "Chậm mà chắc", "Nhập gia tùy tục", "Nói đi đôi với làm", "Tấc đất tấc vàng", "Chân cứng đá mềm", "Lửa thử vàng gian nan thử sức", "Gieo gió gặt bão", "Kính trên nhường dưới", "Uống nước nhớ người đào giếng", "Luyện tay mỗi ngày", "Kỹ năng gõ mười ngón", "Kiên trì sẽ thành công", "Làm việc có kế hoạch", "Đam mê dẫn lối", "Tập trung là chìa khóa", "Sáng tạo không ngừng", "Hành trình vạn dặm bắt đầu từ bước chân", "Thất bại là mẹ thành công", "Đừng bao giờ bỏ cuộc", "Vượt qua giới hạn bản thân", "Không thầy đố mày làm nên công ơn giáo dưỡng thầy cô", "Tri thức là sức mạnh", "Đường tuy ngắn không đi không đến việc tuy nhỏ không làm không xong"];
    
    let curIdx = 0, curL = 1, words = [], errorCount = 0;
    const list = document.getElementById('ls-list');
    for(let i=1; i<=54; i++){
        const item = document.createElement('div');
        item.className = 'nav-item'; item.id = `l-nav-${i}`; item.innerText = `B${i}`;
        item.onclick = () => loadL(i); list.appendChild(item);
    }

    const rows = ["1234567890-=", "qwertyuiop[]", "asdfghjkl;'", "zxcvbnm,./"];
    const kb = document.getElementById('kb-grid');
    rows.forEach(r => {
        const div = document.createElement('div'); div.className = 'kb-row';
        r.split('').forEach(c => { div.innerHTML += `<div class="key" id="k-${c}">${c.toUpperCase()}</div>`; });
        kb.appendChild(div);
    });
    kb.innerHTML += `<div class="kb-row"><div class="key space" id="k-space">SPACE</div></div>`;

    function loadL(id) {
        curL = id; curIdx = 0; errorCount = 0;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`l-nav-${id}`).classList.add('active');
        document.getElementById('modal').style.display = 'none';
        document.getElementById('p-fill').style.width = `${(id/54)*100}%`;
        
        const note = document.getElementById('unikey-note');
        if(id <= 4) { note.innerText = "⚠️ UNIKEY SANG [E]"; note.className = "note-e"; }
        else { note.innerText = "✅ UNIKEY SANG [V]"; note.className = "note-v"; }

        const text = sentenceDB[id-1] || "";
        words = (id <= 4) ? text.split('') : text.split(' ');
        document.getElementById('display-box').innerHTML = words.map((w, i) => `<span class="char" id="c-${i}">${w === ' ' ? '&nbsp;' : w}</span>`).join(id <= 4 ? '' : '<span>&nbsp;</span>');
        updateH();
    }

    function updateH() {
        document.querySelectorAll('.char, .key, .finger').forEach(el => el.classList.remove('current', 'active'));
        const curCharEl = document.getElementById(`c-${curIdx}`);
        if(curCharEl) curCharEl.classList.add('current');
        
        let char = (curL <= 4) ? words[curIdx].toLowerCase() : (words[curIdx] ? words[curIdx][0].toLowerCase() : "");
        if(words[curIdx] === ' ') char = ' ';
        const k = document.getElementById(char === ' ' ? 'k-space' : `k-${char}`);
        if(k) k.classList.add('active');
        const f = fMap[char]; if(f) document.getElementById(`f-${f}`).classList.add('active');
    }

    const input = document.getElementById('in');

    // CẤM SỬA TUYỆT ĐỐI TOÀN BỘ ỨNG DỤNG
    input.onkeydown = (e) => {
        if(e.key === 'Backspace') {
            e.preventDefault();
            return false;
        }
    };

    input.oninput = () => {
        const val = input.value;
        if(!val) return;
        const target = words[curIdx];

        if(curL <= 4) {
            const charTyped = val.slice(-1);
            if(charTyped === target) {
                document.getElementById(`c-${curIdx}`).className = 'char correct';
            } else {
                document.getElementById(`c-${curIdx}`).className = 'char wrong';
                errorCount++;
                const wk = document.getElementById(charTyped === ' ' ? 'k-space' : `k-${charTyped.toLowerCase()}`);
                if(wk) { wk.classList.add('wrong-key'); setTimeout(() => wk.classList.remove('wrong-key'), 600); }
            }
            curIdx++; input.value = "";
        } else {
            if(val.endsWith(' ')) {
                const typedWord = val.trim();
                if(typedWord === target) document.getElementById(`c-${curIdx}`).className = 'char correct';
                else { document.getElementById(`c-${curIdx}`).className = 'char wrong'; errorCount++; }
                curIdx++; input.value = "";
            } else return; 
        }

        if(curIdx < words.length) updateH(); else showResult();
    };

    function showResult() {
        const acc = Math.round(((words.length - errorCount) / words.length) * 100);
        document.getElementById('res-txt').innerText = acc >= 90 ? "XUẤT SẮC!" : "CỐ GẮNG HƠN!";
        document.getElementById('res-info').innerText = `Độ chính xác: ${acc}% | Lỗi: ${errorCount}`;
        document.getElementById('modal').style.display = 'flex';
    }

    function nextL() { loadL(curL >= 54 ? 1 : curL + 1); }
    window.onload = () => loadL(1);
    document.onclick = () => input.focus();
</script>
</body>
</html>
