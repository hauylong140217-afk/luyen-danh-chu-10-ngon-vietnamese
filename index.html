<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện Gõ 10 Ngón - Hà Uy Long & Gemini</title>
    <style>
        :root { --bg: #f0f2f5; --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #343a40; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: 220px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; height: 100vh; }
        .sidebar-header { padding: 20px; font-weight: bold; color: var(--primary); border-bottom: 2px solid #eee; text-align: center; font-size: 16px; position: sticky; top: 0; background: white; z-index: 5; }
        .nav-item { padding: 12px 20px; color: #444; cursor: pointer; border-left: 4px solid transparent; font-size: 13px; border-bottom: 1px solid #f1f1f1; }
        .nav-item:hover { background: #f8f9fa; }
        .nav-item.active { background: #e7f1ff; border-left-color: var(--primary); font-weight: bold; color: var(--primary); }

        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        .content-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; padding-bottom: 250px; }

        .intro-section { width: 100%; max-width: 800px; text-align: center; margin-bottom: 15px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        .note-box { width: 100%; max-width: 800px; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .note-unikey { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .note-v { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; font-size: 20px !important; }

        .typing-box { width: 100%; max-width: 800px; text-align: center; margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 5px; }
        .char { font-family: 'Consolas', monospace; font-size: 26px; color: #bbb; padding: 2px 4px; border-radius: 4px; }
        .char.current { color: #000; border-bottom: 4px solid var(--primary); background: #fffde7; }
        .char.correct { color: var(--success); }
        .char.wrong { color: white; background: var(--danger); }

        .keyboard-wrapper { background: #dee2e6; padding: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; border-top: 2px solid #bbb; position: absolute; bottom: 0; left: 0; }
        .kb-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .key { width: 42px; height: 42px; background: white; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #aaa; font-size: 14px; }
        .key.active { background: var(--success) !important; color: white; }
        .key.space { width: 240px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .result-box { background: white; padding: 40px; border-radius: 15px; text-align: center; max-width: 400px; width: 90%; }
        .btn-next { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">LỘ TRÌNH 60 BÀI</div>
        <div id="lesson-list"></div>
    </div>

    <div class="main">
        <div class="content-area">
            <div class="intro-section">
                <h2>Luyện Gõ 10 Ngón Chuyên Nghiệp</h2>
                <p>Hợp tác: <b>Hà Uy Long & AI Gemini</b></p>
            </div>
            <div id="dynamic-note" class="note-box note-unikey">⚠️ LƯU Ý: CHUYỂN UNIKEY SANG TIẾNG ANH (CHỮ E)</div>
            <div class="typing-box" id="target-text"></div>
        </div>
        <div class="keyboard-wrapper">
            <div class="kb-row" id="r1"></div><div class="kb-row" id="r2"></div><div class="kb-row" id="r3"></div>
            <div class="kb-row"><div class="key space" id="k-space">SPACE</div></div>
        </div>
    </div>

    <div class="modal" id="modal-res">
        <div class="result-box">
            <h2 id="modal-title">Hoàn thành!</h2>
            <p id="stats-info" style="font-size: 18px; color: #555;"></p>
            <button class="btn-next" id="btn-next-action" onclick="handleNextStep()">Bài tiếp theo ➔</button>
        </div>
    </div>

    <input type="text" id="keyboard-input" style="position: absolute; opacity: 0;" autocomplete="off">

    <script>
        // DANH SÁCH 60 BÀI ĐẦY ĐỦ - KHÔNG THIẾU
        const lessonContent = [
            "aaaa ssss dddd ffff jjjj kkkk llll ;;;;", // 1
            "asdf jkl; asdf jkl; asdf jkl; asdf jkl;", // 2
            "aa ss dd ff jj kk ll ;; af jk sd l;", // 3
            "gh gh gh gh ty ty ty ty ur ur ur ur", // 4
            "bài 5 má mà mả mã mạ cá cà cả mã mạ", // 5
            "bài 6 con cò bé bé nó đậu cành tre", // 6
            "bài 7 học thầy không tày học bạn", // 7
            "bài 8 uống nước nhớ nguồn ăn quả nhớ kẻ trồng cây", // 8
            "bài 9 một cây làm chẳng nên non ba cây chụm lại nên hòn núi cao", // 9
            "bài 10 có công mài sắt có ngày nên kim", // 10
            "bài 11 kiến tha lâu cũng đầy tổ", // 11
            "bài 12 lá lành đùm lá rách anh em như thể tay chân", // 12
            "bài 13 bầu ơi thương lấy bí cùng tuy rằng khác giống nhưng chung một giàn", // 13
            "bài 14 đường đời nhiều ngã rẽ quan trọng là chọn đúng hướng", // 14
            "bài 15 thất bại là mẹ thành công", // 15
            "bài 16 có chí thì nên gần mực thì đen gần đèn thì sáng", // 16
            "bài 17 đi một ngày đàng học một sàng khôn", // 17
            "bài 18 lựa lời mà nói cho vừa lòng nhau", // 18
            "bài 19 rách lành đùm bọc dở hay đỡ đần", // 19
            "bài 20 ăn trông nồi ngồi trông hướng học ăn học nói học gói học mở", // 20
            "bài 21 không có gì quý hơn độc lập tự do hạnh phúc", // 21
            "bài 22 đoàn kết đoàn kết đại đoàn kết", // 22
            "bài 23 kiên trì nhẫn nại là chìa khóa thành công", // 23
            "bài 24 đừng bao giờ từ bỏ ước mơ của bạn", // 24
            "bài 25 hãy sống như hôm nay là ngày cuối cùng", // 25
            "bài 26 tương lai nằm trong tay bạn", // 26
            "bài 27 sách là kho tàng tri thức vô tận", // 27
            "bài 28 đọc muôn quyển sách đi muôn dặm đường", // 28
            "bài 29 sức khỏe là vàng hãy bảo vệ nó", // 29
            "bài 30 thời gian là tiền bạc đừng lãng phí", // 30
            "bài 31 lòng tốt là ngôn ngữ ai cũng hiểu", // 31
            "bài 32 sống chậm lại để yêu thương nhiều hơn", // 32
            "bài 33 khó khăn chỉ là thử thách bản lĩnh", // 33
            "bài 34 vượt qua chính mình là chiến thắng lớn nhất", // 34
            "bài 35 nụ cười là liều thuốc bổ cho tâm hồn", // 35
            "bài 36 gieo nhân nào gặt quả nấy", // 36
            "bài 37 trung thực là đức tính quý giá", // 37
            "bài 38 khiêm tốn bao nhiêu cũng chưa đủ", // 38
            "bài 39 hành trình vạn dặm bắt đầu từ một bước chân", // 39
            "bài 40 ngọc bất trác bất thành khí nhân bất học bất tri lý", // 40
            "bài 41 ơn cha nặng lắm ai ơi nghĩa mẹ bằng trời", // 41
            "bài 42 cây có cội nước có nguồn", // 42
            "bài 43 lá rụng về cội tình quê hương", // 43
            "bài 44 ao nhà vẫn hơn dù trong dù đục", // 44
            "bài 45 tốt gỗ hơn tốt nước sơn", // 45
            "bài 46 đói cho sạch rách cho thơm", // 46
            "bài 47 giấy rách phải giữ lấy lề", // 47
            "bài 48 gần bùn mà chẳng hôi tanh mùi bùn", // 48
            "bài 49 một chữ cũng là thầy nửa chữ cũng là thầy", // 49
            "bài 50 không thầy đố mày làm nên", // 50
            "bài 51 tôn sư trọng đạo là truyền thống tốt đẹp", // 51
            "bài 52 kỷ luật là sức mạnh tập thể", // 52
            "bài 53 tự do phải đi đôi với trách nhiệm", // 53
            "bài 54 kiến thức là sức mạnh hành động tạo kết quả", // 54
            "bài 55 học cách lắng nghe để thấu hiểu", // 55
            "bài 56 sáng tạo là chìa khóa giải quyết vấn đề", // 56
            "bài 57 lòng biết ơn làm cuộc sống ý nghĩa", // 57
            "bài 58 sự im lặng đôi khi là câu trả lời tốt nhất", // 58
            "bài 59 hãy luôn nỗ lực vì mục tiêu phía trước", // 59
            "bài 60 hoàn thành xuất sắc cùng hà uy long và ai gemini" // 60
        ];

        let currentIdx = 0, currentLesson = 1, errors = 0, wordsArray = [];
        const list = document.getElementById('lesson-list');

        // Tạo Sidebar đúng 60 mục
        for(let i=1; i<=60; i++) {
            const div = document.createElement('div');
            div.className = 'nav-item'; div.id = `nav-${i}`;
            div.innerText = `Bài học ${i}`;
            div.onclick = () => loadLesson(i);
            list.appendChild(div);
        }

        const rows = ["qwertyuiop", "asdfghjkl;", "zxcvbnm"];
        rows.forEach((str, idx) => {
            const container = document.getElementById(`r${idx+1}`);
            str.split('').forEach(char => {
                const key = document.createElement('div');
                key.className = 'key'; key.id = `key-${char}`;
                key.innerText = char.toUpperCase();
                container.appendChild(key);
            });
        });

        function loadLesson(id) {
            currentLesson = id;
            let rawText = lessonContent[id - 1];
            currentIdx = 0; errors = 0;
            const noteEl = document.getElementById('dynamic-note');
            if (id >= 5) {
                noteEl.innerText = "⚠️ LƯU Ý: CHUYỂN UNIKEY SANG TIẾNG VIỆT (CHỮ V)";
                noteEl.className = "note-box note-v";
            } else {
                noteEl.innerText = "⚠️ LƯU Ý: CHUYỂN UNIKEY SANG TIẾNG ANH (CHỮ E)";
                noteEl.className = "note-box note-unikey";
            }
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${id}`).classList.add('active');
            document.getElementById('modal-res').style.display = 'none';
            const display = document.getElementById('target-text');
            if (id >= 5) {
                wordsArray = rawText.split(' ');
                display.innerHTML = wordsArray.map((w, i) => `<span class="char" id="char-${i}">${w}</span>`).join('<span>&nbsp;</span>');
            } else {
                wordsArray = rawText.split('');
                display.innerHTML = wordsArray.map((c, i) => `<span class="char" id="char-${i}">${c === ' ' ? '&nbsp;' : c}</span>`).join('');
            }
            updateState();
            document.getElementById('keyboard-input').focus();
        }

        function updateState() {
            document.querySelectorAll('.char').forEach(el => el.classList.remove('current'));
            document.querySelectorAll('.key').forEach(el => el.classList.remove('active'));
            const activeChar = document.getElementById(`char-${currentIdx}`);
            if(!activeChar) return;
            activeChar.classList.add('current');
            activeChar.scrollIntoView({ behavior: 'smooth', block: 'center' });
            if (currentLesson < 5) {
                const char = wordsArray[currentIdx].toLowerCase();
                const keyEl = document.getElementById(char === ' ' ? 'k-space' : `key-${char}`);
                if(keyEl) keyEl.classList.add('active');
            }
        }

        document.getElementById('keyboard-input').onkeydown = (e) => {
            if (currentLesson >= 5 && e.key === ' ') {
                e.preventDefault();
                const typedWord = e.target.value.trim();
                if(!typedWord) return;
                const charEl = document.getElementById(`char-${currentIdx}`);
                if (typedWord === wordsArray[currentIdx]) charEl.className = 'char correct';
                else { charEl.className = 'char wrong'; errors++; }
                currentIdx++; e.target.value = "";
                if (currentIdx < wordsArray.length) updateState(); else finish();
            }
        };

        document.getElementById('keyboard-input').oninput = (e) => {
            if (currentLesson < 5) {
                const typed = e.target.value.slice(-1);
                const target = wordsArray[currentIdx];
                const charEl = document.getElementById(`char-${currentIdx}`);
                if(typed === target || (target === ' ' && typed === ' ')) {
                    charEl.className = 'char correct'; currentIdx++;
                } else { charEl.className = 'char wrong'; errors++; }
                if(currentIdx < wordsArray.length) updateState(); else finish();
                e.target.value = "";
            }
        };

        function finish() {
            const accuracy = Math.round(((wordsArray.length - errors) / wordsArray.length) * 100);
            document.getElementById('stats-info').innerHTML = `Độ chính xác: <b>${accuracy}%</b><br>Số lỗi: <b>${errors}</b>`;
            const btn = document.getElementById('btn-next-action');
            if (currentLesson === 60) {
                document.getElementById('modal-title').innerText = "🏆 TUYỆT VỜI!";
                btn.innerText = "Quay lại Bài 1 ↺";
            } else {
                document.getElementById('modal-title').innerText = "Xong Bài " + currentLesson;
                btn.innerText = "Bài tiếp theo ➔";
            }
            document.getElementById('modal-res').style.display = 'flex';
        }

        function handleNextStep() {
            if (currentLesson >= 60) loadLesson(1); else loadLesson(currentLesson + 1);
        }

        window.onload = () => loadLesson(1);
        document.onclick = () => document.getElementById('keyboard-input').focus();
    </script>
</body>
</html>
