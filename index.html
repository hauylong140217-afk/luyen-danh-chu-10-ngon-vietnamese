<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Typing Master Pro - Sửa Lỗi</title>
    <style>
        :root {
            --bg: #f8f9fa; --sidebar-w: 260px; --primary: #007bff;
            --success: #28a745; --danger: #dc3545; --dark: #343a40;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: var(--sidebar-w); background: var(--dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h2 { padding: 20px; font-size: 18px; border-bottom: 1px solid #495057; margin: 0; color: var(--primary); text-align: center; }
        .nav-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .nav-item { padding: 10px 20px; color: #adb5bd; text-decoration: none; display: block; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: #495057; color: white; border-left: 4px solid var(--primary); }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .container { width: 90%; max-width: 850px; padding: 30px 0; display: flex; flex-direction: column; align-items: center; }

        /* Hướng dẫn gõ */
        .guide-box { background: #fff; padding: 15px; border-radius: 10px; width: 100%; margin-bottom: 20px; border: 1px solid #ddd; font-size: 13px; }
        .guide-table { width: 100%; border-collapse: collapse; }
        .guide-table th, .guide-table td { border: 1px solid #eee; padding: 5px; text-align: center; }

        /* Typing Box */
        .typing-box { width: 100%; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); min-height: 150px; text-align: left; }
        .word-label { 
            display: inline-block; font-family: 'Consolas', monospace; font-size: 30px; 
            margin: 5px 10px; padding: 2px 10px; border-radius: 5px; color: #ced4da;
        }
        .word-label.current { color: #212529; background: #e7f1ff; border-bottom: 3px solid var(--primary); }
        .word-label.correct { color: var(--success); }
        .word-label.wrong { color: var(--danger); background: #fff5f5; border-bottom: 3px solid var(--danger); }

        .keyboard { display: flex; flex-direction: column; gap: 5px; background: #e9ecef; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .row { display: flex; gap: 5px; justify-content: center; }
        .key { width: 45px; height: 45px; background: white; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #ccc; font-size: 14px; }
        .key.active { background: var(--primary); color: white; border-color: var(--primary); }
        .key.space { width: 250px; }

        #input-hidden { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>TYPING MASTER</h2>
        <div class="nav-list">
            <a class="nav-item active" onclick="location.reload()">🏠 Trang chủ</a>
            <div style="padding: 10px 20px; font-size: 11px; color: #6c757d;">BÀI TẬP (1-15)</div>
            <div id="lesson-links"></div>
            <a class="nav-item" onclick="alert('Luyện gõ 10 ngón Tiếng Việt v2.0')">ℹ️ Giới thiệu</a>
        </div>
    </div>

    <div class="main">
        <div class="container">
            <div class="guide-box">
                <table class="guide-table">
                    <tr><th>Dấu</th><th>Sắc</th><th>Huyền</th><th>Hỏi</th><th>Ngã</th><th>Nặng</th><th>Â/Ê/Ô</th><th>Ă/Ư/Ơ</th></tr>
                    <tr><td><b>Telex</b></td><td>s</td><td>f</td><td>r</td><td>x</td><td>j</td><td>aa/ee/oo</td><td>aw/uw/ow</td></tr>
                </table>
            </div>

            <div class="typing-box">
                <div id="text-display">Hãy chọn một bài học ở bên trái để bắt đầu!</div>
            </div>

            <div class="keyboard" id="kb">
                <div class="row" id="r1"></div><div class="row" id="r2"></div><div class="row" id="r3"></div>
                <div class="row"><div class="key space" id="k-space">Dấu cách (Space)</div></div>
            </div>
        </div>
    </div>

    <input type="text" id="input-hidden">

    <script>
        const lessons = {
            1: "aa ss dd ff jj kk ll ;;",
            2: "asdf jkl; asdf jkl;",
            3: "aa aa ss ss dd dd ff ff",
            4: "Trời xanh mây trắng nắng vàng.",
            5: "Học gõ máy tính rất thú vị."
        };

        let currentWordIdx = 0, words = [];

        // Tạo bàn phím ảo
        const layout = ["qwertyuiop", "asdfghjkl;", "zxcvbnm"];
        layout.forEach((r, i) => {
            const row = document.getElementById('r' + (i + 1));
            r.split('').forEach(c => {
                const k = document.createElement('div');
                k.className = 'key'; k.id = 'k-' + c; k.innerText = c.toUpperCase();
                row.appendChild(k);
            });
        });

        // Tạo Sidebar bài học
        const side = document.getElementById('lesson-links');
        for(let i=1; i<=15; i++) {
            const a = document.createElement('a'); a.className = 'nav-item';
            a.innerText = `Bài học ${i}`; a.onclick = () => startLesson(i);
            side.appendChild(a);
        }

        function startLesson(id) {
            const text = lessons[id] || "Bài tập đang được soạn thảo...";
            words = text.split(' ');
            currentWordIdx = 0;
            
            const display = document.getElementById('text-display');
            display.innerHTML = words.map((w, i) => `<label class="word-label" id="w-${i}">${w}</label>`).join('');
            
            document.getElementById('w-0').className = 'word-label current';
            document.getElementById('input-hidden').value = "";
            document.getElementById('input-hidden').focus();
            updateKeyHighlight();
        }

        document.getElementById('input-hidden').addEventListener('input', (e) => {
            let inputVal = e.target.value;
            const currentLabel = document.getElementById(`w-${currentWordIdx}`);
            const targetWord = words[currentWordIdx];

            // Nếu nhấn Space (kết thúc cụm từ)
            if (inputVal.endsWith(' ')) {
                const typed = inputVal.trim();
                // So sánh chính xác từ đã gõ với từ mục tiêu
                if (typed === targetWord) {
                    currentLabel.className = 'word-label correct';
                } else {
                    currentLabel.className = 'word-label wrong';
                }

                currentWordIdx++;
                e.target.value = "";

                if (currentWordIdx < words.length) {
                    document.getElementById(`w-${currentWordIdx}`).className = 'word-label current';
                    updateKeyHighlight();
                } else {
                    alert("Hoàn thành bài tập!");
                }
            } else {
                updateKeyHighlight(targetWord[inputVal.length]);
            }
        });

        function updateKeyHighlight(char) {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
            let keyId = 'k-' + (char ? char.toLowerCase() : '');
            if (char === ' ') keyId = 'k-space';
            const el = document.getElementById(keyId);
            if (el) el.classList.add('active');
        }

        document.addEventListener('click', () => document.getElementById('input-hidden').focus());
    </script>
</body>
</html>
