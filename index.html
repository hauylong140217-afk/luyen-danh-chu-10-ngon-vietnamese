<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Luyện Gõ 10 Ngón - 2000 Bài Tập</title>
    <style>
        :root {
            --bg: #ffffff; --panel: #f8fafc; --text: #1e293b;
            --primary: #0284c7; --success: #22c55e; --danger: #ef4444;
            --kb-key: #f1f5f9; --key-text: #475569;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
                --kb-key: #334155; --key-text: #f8fafc;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 300px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        /* PHẦN TÁC GIẢ TO */
        .author-box {
            padding: 20px 15px 5px 15px;
            font-size: 25px;
            font-weight: bold;
            text-align: center;
            color: var(--text);
        }

        .unikey-alert { padding: 15px; margin: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; text-align: center; border: 2px solid var(--primary); }
        .mode-e { background: #fee2e2; color: #b91c1c; border-color: #ef4444; }
        .mode-v { background: #dcfce7; color: #15803d; border-color: #22c55e; }

        .ls-list { flex: 1; overflow-y: auto; padding: 10px; }
        .ls-item { padding: 10px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; border: 1px solid rgba(0,0,0,0.05); }
        .ls-item.active { background: var(--primary); color: white; }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .stats { height: 60px; display: flex; align-items: center; justify-content: space-around; background: rgba(0,0,0,0.08); font-weight: bold; }
        .stat-val { font-size: 22px; color: var(--primary); }

        .typing-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 30px; }
        .display-box { width: 90%; max-width: 850px; background: var(--panel); padding: 40px; border-radius: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .char { font-size: 34px; font-weight: bold; color: #94a3b8; border-bottom: 4px solid transparent; }
        .char.active { color: var(--text); border-bottom-color: var(--primary); }
        .char.ok { color: var(--success); }
        .char.err { background: var(--danger); color: white; border-radius: 4px; }

        .kb-container { display: flex; align-items: flex-end; gap: 30px; }
        .hand { width: 130px; height: 130px; fill: none; stroke: currentColor; stroke-width: 1.5; opacity: 0.2; }
        .hand.active { opacity: 1; color: var(--primary); }
        .finger.active { fill: var(--primary); }

        .keyboard { background: rgba(0,0,0,0.1); padding: 10px; border-radius: 10px; }
        .kb-row { display: flex; gap: 4px; margin-bottom: 4px; justify-content: center; }
        .key { width: 40px; height: 40px; background: var(--kb-key); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border-bottom: 3px solid rgba(0,0,0,0.2); }
        .key.active { background: var(--primary); color: white; transform: translateY(2px); border-bottom: 0; }

        #result-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .result-card { background: var(--bg); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid var(--primary); }
        #hidden-input { position: fixed; top: -100px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="author-box">Tác giả: HÀ UY LONG</div>
    
    <div id="unikey-hint" class="unikey-alert">UNIKEY CHECK</div>
    <div class="ls-list" id="ls-list"></div>
</div>

<div class="main">
    <div class="stats">
        <div>BÀI: <span id="cur-lesson-name">1</span></div>
        <div>WPM: <span id="wpm" class="stat-val">0</span></div>
        <div>CHÍNH XÁC: <span id="acc" class="stat-val">0%</span></div>
    </div>

    <div class="typing-zone">
        <div class="display-box" id="display"></div>
        <div class="kb-container">
            <svg id="hand-l" class="hand" viewBox="0 0 100 100"><path class="finger" id="f-l5" d="M10,60 Q5,30 15,30 T25,60" /><path class="finger" id="f-l4" d="M25,50 Q20,15 35,15 T45,50" /><path class="finger" id="f-l3" d="M45,40 Q45,5 55,5 T65,40" /><path class="finger" id="f-l2" d="M65,50 Q75,15 85,20 T80,55" /><path class="finger" id="f-l1" d="M80,80 Q95,75 90,95" /></svg>
            <div class="keyboard" id="keyboard"></div>
            <svg id="hand-r" class="hand" viewBox="0 0 100 100"><path class="finger" id="f-r5" d="M90,60 Q95,30 85,30 T75,60" /><path class="finger" id="f-r4" d="M75,50 Q80,15 65,15 T55,50" /><path class="finger" id="f-r3" d="M55,40 Q55,5 45,5 T35,40" /><path class="finger" id="f-r2" d="M35,50 Q25,15 15,20 T20,55" /><path class="finger" id="f-r1" d="M20,80 Q5,75 10,95" /></svg>
        </div>
    </div>

    <div id="result-overlay">
        <div class="result-card">
            <h2 style="color:var(--primary)">HOÀN THÀNH!</h2>
            <div id="final-stats" style="margin: 20px 0; font-size: 20px;"></div>
            <button onclick="nextLesson()" style="padding:12px 30px; cursor:pointer; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;">BÀI TIẾP THEO ➔</button>
        </div>
    </div>
</div>

<input type="text" id="hidden-input" autofocus>

<script>
    const baseTexts = [
        "má mà mả mã mạ", "con cò có cái cổ cong cong", "uống nước nhớ nguồn", "ăn quả nhớ kẻ trồng cây",
        "lá lành đùm lá rách", "tiên học lễ hậu học văn", "có chí thì nên", "tốt gỗ hơn tốt nước sơn",
        "đói cho sạch rách cho thơm", "kiến tha lâu cũng đầy tổ", "không thầy đố mày làm nên",
        "học thầy không tày học bạn", "công cha như núi thái sơn", "nghĩa mẹ như nước trong nguồn chảy ra",
        "gần mực thì đen gần đèn thì sáng", "ăn chậm nhai kỹ", "học một biết mười", "thời gian là vàng bạc",
        "lời chào cao hơn mâm cỗ", "đoàn kết là sức mạnh", "sức khỏe là vốn quý nhất", "cái nết đánh chết cái đẹp",
        "chậm mà chắc", "nhập gia tùy tục", "nói đi đôi với làm", "tấc đất tấc vàng", "chân cứng đá mềm",
        "gieo gió gặt bão", "kính trên nhường dưới", "uống nước nhớ người đào giếng", "luyện tay mỗi ngày",
        "kỹ năng gõ mười ngón", "kiên trì sẽ thành công", "làm việc có kế hoạch", "đam mê dẫn lối",
        "tập trung là chìa khóa", "sáng tạo không ngừng", "thất bại là mẹ thành công", "vượt qua giới hạn bản thân",
        "tri thức là sức mạnh", "đường tuy ngắn không đi không đến", "việc tuy nhỏ không làm không xong",
        "một con ngựa đau cả tàu bỏ cỏ", "mùa xuân là tết trồng cây", "không có việc gì khó", "chỉ sợ lòng không bền",
        "đào núi và lấp biển", "quyết chí ắt làm nên", "vì lợi ích mười năm trồng cây", "vì lợi ích trăm năm trồng người",
        "đi một ngày đàng học một sàng khôn", "có công mài sắt có ngày nên kim", "muốn biết phải hỏi muốn giỏi phải học"
    ];

    const DATA = [
        "asdf jkl; asdf jkl;", "aa ss dd ff jj kk ll ;;", "asdfasdf jkl;jkl;", "fj f d s a j k l ;"
    ];

    for(let i=4; i<2000; i++) {
        DATA.push(baseTexts[i % baseTexts.length]);
    }

    const KB_MAP = ["1234567890-=", "qwertyuiop[]", "asdfghjkl;'", "zxcvbnm,./"];
    const FINGER_MAP = {
        'q':'f-l5','a':'f-l5','z':'f-l5','w':'f-l4','s':'f-l4','x':'f-l4','e':'f-l3','d':'f-l3','c':'f-l3','r':'f-l2','f':'f-l2','v':'f-l2','t':'f-l2','g':'f-l2','b':'f-l2',
        'y':'f-r2','h':'f-r2','n':'f-r2','u':'f-r2','j':'f-r2','m':'f-r2','i':'f-r3','k':'f-r3',',':'f-r3','o':'f-r4','l':'f-r4','.':'f-r4','p':'f-r5',';':'f-r5',' ':'f-r1'
    };

    let curL = 1, chars = [], curIdx = 0, errors = 0, startTime = null, isIME = false;

    function init() {
        const list = document.getElementById('ls-list');
        DATA.forEach((d, i) => {
            list.innerHTML += `<div class="ls-item" id="ls-${i+1}" onclick="loadLesson(${i+1})">Bài ${i+1}</div>`;
        });
        const kb = document.getElementById('keyboard');
        KB_MAP.forEach(row => {
            const r = document.createElement('div'); r.className = 'kb-row';
            row.split('').forEach(k => r.innerHTML += `<div class="key" id="k-${k}">${k.toUpperCase()}</div>`);
            kb.appendChild(r);
        });
        kb.innerHTML += `<div class="kb-row"><div class="key" id="k-space" style="width:250px">SPACE</div></div>`;
        loadLesson(1);
        setupInput();
    }

    function resetStats() {
        curIdx = 0; errors = 0; startTime = null;
        document.getElementById('wpm').innerText = "0";
        document.getElementById('acc').innerText = "0%";
    }

    function loadLesson(id) {
        resetStats();
        curL = id;
        document.getElementById('result-overlay').style.display = 'none';
        document.querySelectorAll('.ls-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`ls-${id}`);
        if(activeItem) {
            activeItem.classList.add('active');
            activeItem.scrollIntoView({ block: 'nearest' });
        }
        document.getElementById('cur-lesson-name').innerText = id;

        const hint = document.getElementById('unikey-hint');
        if(id <= 4) {
            hint.innerText = "UNIKEY: CHỮ [E]";
            hint.className = "unikey-alert mode-e";
        } else {
            hint.innerText = "UNIKEY: CHỮ [V]";
            hint.className = "unikey-alert mode-v";
        }

        chars = DATA[id-1].split('');
        const disp = document.getElementById('display');
        disp.innerHTML = chars.map((c, i) => `<span class="char" id="c-${i}">${c === ' ' ? '&nbsp;' : c}</span>`).join('');
        updateUI();
    }

    function setupInput() {
        const input = document.getElementById('hidden-input');
        input.addEventListener('compositionstart', () => isIME = true);
        input.addEventListener('compositionend', () => { 
            isIME = false; 
            if(curL > 4) { handleInput(input.value.normalize('NFC')); input.value = ""; }
        });
        input.oninput = () => {
            if (isIME) return;
            if (curL <= 4) { handleInput(input.value); input.value = ""; }
            else if (input.value.endsWith(' ')) { handleInput(input.value.trim().normalize('NFC') + ' '); input.value = ""; }
        };
        document.body.onclick = () => input.focus();
    }

    function handleInput(typed) {
        if (!startTime) startTime = new Date();
        const typedArr = typed.split('');
        typedArr.forEach(char => {
            if (curIdx >= chars.length) return;
            const target = chars[curIdx].normalize('NFC');
            const el = document.getElementById(`c-${curIdx}`);
            if (char === target) el.className = 'char ok';
            else { el.className = 'char err'; errors++; }
            curIdx++;
        });
        if (curIdx >= chars.length) showResult();
        else updateUI();
    }

    function updateUI() {
        document.querySelectorAll('.char, .key, .finger, .hand').forEach(el => el.classList.remove('active'));
        const targetEl = document.getElementById(`c-${curIdx}`);
        if (!targetEl) return;
        targetEl.classList.add('active');
        const nextChar = chars[curIdx].toLowerCase();
        const keyEl = document.getElementById(nextChar === ' ' ? 'k-space' : `k-${nextChar}`);
        if (keyEl) keyEl.classList.add('active');
        const fingerId = FINGER_MAP[nextChar];
        if (fingerId) {
            document.getElementById(fingerId).classList.add('active');
            document.getElementById(fingerId.startsWith('f-l') ? 'hand-l' : 'hand-r').classList.add('active');
        }
        if (startTime) {
            const min = (new Date() - startTime) / 60000;
            document.getElementById('wpm').innerText = Math.round((curIdx / 5) / min) || 0;
            document.getElementById('acc').innerText = Math.round(((curIdx - errors) / (curIdx || 1)) * 100) + "%";
        }
    }

    function showResult() {
        const finalAcc = Math.round(((chars.length - errors) / chars.length) * 100);
        document.getElementById('final-stats').innerHTML = `Tốc độ: <b>${document.getElementById('wpm').innerText} WPM</b><br>Độ chính xác: <b>${finalAcc}%</b>`;
        document.getElementById('result-overlay').style.display = 'flex';
    }

    function nextLesson() { loadLesson(curL < DATA.length ? curL + 1 : 1); }
    window.onload = init;
</script>
</body>
</html>
