<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện Gõ 10 Ngón - Hà Uy Long</title>
    <style>
        :root {
            --bg: #1e293b; --panel: #334155; --text: #f8fafc;
            --primary: #38bdf8; --success: #4ade80; --danger: #f87171;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background: #0f172a; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .author { padding: 25px; font-size: 24px; font-weight: 800; text-align: center; color: var(--primary); border-bottom: 1px solid #334155; }
        .ls-list { flex: 1; overflow-y: auto; padding: 10px; }
        .ls-item { padding: 12px; margin-bottom: 6px; border-radius: 6px; cursor: pointer; font-size: 14px; color: #94a3b8; transition: 0.2s; }
        .ls-item:hover { background: rgba(255,255,255,0.05); }
        .ls-item.active { background: var(--primary); color: #0f172a; font-weight: bold; }

        .main { flex: 1; display: flex; flex-direction: column; }
        .stats-bar { height: 60px; display: flex; align-items: center; justify-content: space-around; background: #0f172a; border-bottom: 1px solid #334155; }
        .stat { font-weight: bold; }
        .stat span { color: var(--primary); font-size: 20px; margin-left: 8px; }

        .typing-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .word-display { 
            width: 100%; max-width: 900px; background: var(--panel); padding: 40px; border-radius: 12px; 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; line-height: 1.6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .char { font-size: 34px; font-weight: 600; color: #64748b; border-bottom: 3px solid transparent; }
        .char.active { color: var(--text); border-bottom-color: var(--primary); background: rgba(56, 189, 248, 0.1); }
        .char.ok { color: var(--success); }
        .char.err { color: var(--danger); }

        .kb { margin-top: 40px; }
        .row { display: flex; gap: 4px; margin-bottom: 4px; justify-content: center; }
        .key { width: 45px; height: 45px; background: #475569; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; border-bottom: 3px solid #1e293b; }
        .key.active { background: var(--primary); color: #0f172a; border-bottom: 0; transform: translateY(2px); }

        #overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.9); display: none; align-items: center; justify-content: center; z-index: 10; }
        .card { background: var(--panel); padding: 40px; border-radius: 16px; text-align: center; border: 2px solid var(--primary); }
        #h-input { position: absolute; opacity: 0; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="author">Hà Uy Long</div>
    <div class="ls-list" id="ls-list"></div>
</div>

<div class="main">
    <div class="stats-bar">
        <div class="stat">BÀI: <span id="l-num">1</span></div>
        <div class="stat">WPM: <span id="wpm">0</span></div>
        <div class="stat">ACC: <span id="acc">0%</span></div>
    </div>
    <div class="typing-area">
        <div class="word-display" id="display"></div>
        <div class="kb" id="kb"></div>
    </div>
    <div id="overlay">
        <div class="card">
            <h1 style="margin-bottom:20px">KẾT QUẢ</h1>
            <div id="res-text" style="font-size: 18px; margin-bottom: 30px;"></div>
            <button onclick="nextL()" style="padding:12px 35px; background:var(--primary); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">BÀI TIẾP THEO</button>
        </div>
    </div>
</div>

<input type="text" id="h-input" autofocus autocomplete="off">

<script>
    const warmUp = [
        "asdf jkl; asdf jkl; asdf jkl; asdf jkl;",
        "aa ss dd ff jj kk ll ;; asdf jkl;",
        "asdfasdf jkl;jkl; a s d f j k l ;",
        "f d s a j k l ; fj gh ty ur ie wo qp"
    ];

    const phrases = [
        "má mà mả mã mạ", "con cò có cái cổ cong cong", "uống nước nhớ nguồn", "ăn quả nhớ kẻ trồng cây",
        "lá lành đùm lá rách", "tiên học lễ hậu học văn", "có chí thì nên", "tốt gỗ hơn tốt nước sơn"
    ];

    let DATA = [...warmUp, ...phrases];
    const KB_LAYOUT = ["1234567890-=", "qwertyuiop[]", "asdfghjkl;'", "zxcvbnm,./"];
    let curIdx = 0, errors = 0, startTime = null, currentLesson = 1, chars = [], isIME = false;

    function init() {
        const list = document.getElementById('ls-list');
        DATA.forEach((d, i) => {
            list.innerHTML += `<div class="ls-item" id="ls-${i+1}" onclick="loadLesson(${i+1})">Bài ${i+1}: ${d.substring(0, 12)}...</div>`;
        });
        
        const kb = document.getElementById('kb');
        KB_LAYOUT.forEach(row => {
            const r = document.createElement('div'); r.className = 'row';
            row.split('').forEach(k => r.innerHTML += `<div class="key" id="k-${k}">${k.toUpperCase()}</div>`);
            kb.appendChild(r);
        });
        kb.innerHTML += `<div class="row"><div class="key" id="k-space" style="width:250px">SPACE</div></div>`;
        
        loadLesson(1);
        setupEvents();
    }

    function loadLesson(id) {
        currentLesson = id; curIdx = 0; errors = 0; startTime = null;
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.ls-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`ls-${id}`).classList.add('active');
        document.getElementById('l-num').innerText = id;
        
        chars = DATA[id-1].split('');
        document.getElementById('display').innerHTML = chars.map((c, i) => 
            `<span class="char" id="c-${i}">${c === ' ' ? '&nbsp;' : c}</span>`
        ).join('');
        updateUI();
    }

    function setupEvents() {
        const input = document.getElementById('h-input');
        input.onkeydown = (e) => { if(e.key === "Backspace") e.preventDefault(); };
        input.addEventListener('compositionstart', () => isIME = true);
        input.addEventListener('compositionend', (e) => { 
            isIME = false; 
            process(e.data.normalize('NFC')); 
            input.value = ""; 
        });
        input.oninput = (e) => { 
            if(!isIME && e.data) { process(e.data); input.value = ""; }
        };
        document.body.onclick = () => input.focus();
    }

    function process(typed) {
        if (!startTime) startTime = new Date();
        
        for (let char of typed) {
            if (curIdx >= chars.length) break;
            const target = chars[curIdx].normalize('NFC');

            // LOGIC TYPING STUDY:
            // 1. Chặn nhấn Space nếu chưa đến lúc
            if (target === ' ' && char !== ' ') continue;
            // 2. Chặn nhấn phím chữ nếu đang ở dấu cách
            if (target !== ' ' && char === ' ') continue;

            const el = document.getElementById(`c-${curIdx}`);
            if (char === target) {
                el.className = 'char ok';
            } else {
                el.className = 'char err'; // Báo đỏ nhưng vẫn cho nhảy qua
                errors++;
            }
            curIdx++;
        }
        
        if (curIdx >= chars.length) finish();
        else updateUI();
    }

    function updateUI() {
        document.querySelectorAll('.char, .key').forEach(el => el.classList.remove('active'));
        const targetEl = document.getElementById(`c-${curIdx}`);
        if (targetEl) {
            targetEl.classList.add('active');
            const key = chars[curIdx].toLowerCase();
            const keyEl = document.getElementById(key === ' ' ? 'k-space' : `k-${key}`);
            if (keyEl) keyEl.classList.add('active');
        }
        if (startTime) {
            const min = (new Date() - startTime) / 60000;
            document.getElementById('wpm').innerText = Math.round((curIdx / 5) / min) || 0;
            document.getElementById('acc').innerText = Math.round(((curIdx - errors) / curIdx) * 100) + "%";
        }
    }

    function finish() {
        const acc = Math.round(((chars.length - errors) / chars.length) * 100);
        document.getElementById('res-text').innerHTML = `Tốc độ: <b>${document.getElementById('wpm').innerText} WPM</b><br>Độ chính xác: <b>${acc}%</b>`;
        document.getElementById('overlay').style.display = 'flex';
    }

    function nextL() { loadLesson(currentLesson < DATA.length ? currentLesson + 1 : 1); }
    window.onload = init;
</script>
</body>
</html>
