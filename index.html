<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện Gõ 10 Ngón - Full Version</title>
    <style>
        :root { --bg: #f0f2f5; --primary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 220px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; padding: 10px 0; }
        .nav-item { padding: 10px 20px; color: #333; text-decoration: none; cursor: pointer; font-size: 14px; transition: 0.2s; border-left: 4px solid transparent; }
        .nav-item.active { background: #e7f1ff; border-left-color: var(--primary); font-weight: bold; color: var(--primary); }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        
        /* Bảng hướng dẫn gõ dấu (Dựa trên ảnh của bạn) */
        .guide-container { width: 100%; max-width: 900px; margin-bottom: 20px; display: none; }
        .guide-table { width: 100%; border-collapse: collapse; background: white; border: 2px solid #333; }
        .guide-table th, .guide-table td { border: 1px solid #333; padding: 8px; text-align: center; font-weight: bold; }
        .guide-table th { background: #f8f9fa; font-size: 16px; }
        .type-label { background: #eee; width: 80px; }
        .key-highlight { color: var(--danger); font-size: 20px; }

        /* Khu vực hiển thị chữ gõ */
        .typing-area { width: 100%; max-width: 900px; text-align: center; margin-bottom: 20px; min-height: 60px; }
        .char-box { font-family: 'Consolas', monospace; font-size: 40px; color: #bbb; margin: 0 1px; display: inline-block; }
        .char-box.current { color: #000; border-bottom: 4px solid var(--primary); background: rgba(0,123,255,0.1); }
        .char-box.correct { color: var(--success); }
        .char-box.wrong { color: var(--danger); background: rgba(220,53,69,0.1); }

        /* Bàn phím ảo */
        .keyboard { background: #dee2e6; padding: 12px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .kb-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 6px; }
        .key { width: 45px; height: 45px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; border: 1px solid #ccc; }
        .key.active { background: var(--success) !important; color: white; transform: translateY(2px); box-shadow: inset 0 3px 5px rgba(0,0,0,0.2); }
        .key.space { width: 250px; }

        /* SVG 10 ngón tay */
        .hands-display { display: flex; gap: 80px; align-items: flex-end; }
        .hand-svg { width: 180px; height: auto; fill: #d1d1d1; }
        .finger-dot { fill: #d1d1d1; transition: 0.2s; }
        .finger-dot.active { fill: var(--success); filter: drop-shadow(0 0 5px var(--success)); }
        
        #unikey-msg { color: #856404; background: #fff3cd; padding: 10px 25px; border-radius: 20px; margin-bottom: 15px; font-weight: bold; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding: 20px; font-weight: bold; font-size: 18px; color: var(--primary);">TYPING MASTER</div>
        <div id="lesson-links"></div>
    </div>

    <div class="main">
        <div id="unikey-msg" style="display:none">⚠️ CHUYỂN UNIKEY SANG CHẾ ĐỘ TIẾNG ANH (CHỮ E)</div>

        <div class="guide-container" id="viet-guide">
            <table class="guide-table">
                <tr>
                    <th class="type-label" rowspan="2">TELEX</th>
                    <th>Dấu sắc</th>
                    <th>Dấu huyền</th>
                    <th>Dấu hỏi</th>
                    <th>Dấu ngã</th>
                    <th>Dấu nặng</th>
                </tr>
                <tr>
                    <td class="key-highlight">S</td>
                    <td class="key-highlight">F</td>
                    <td class="key-highlight">R</td>
                    <td class="key-highlight">X</td>
                    <td class="key-highlight">J</td>
                </tr>
                <tr>
                    <th class="type-label" rowspan="2">VNI</th>
                    <th>Dấu sắc</th>
                    <th>Dấu huyền</th>
                    <th>Dấu hỏi</th>
                    <th>Dấu ngã</th>
                    <th>Dấu nặng</th>
                </tr>
                <tr>
                    <td class="key-highlight">1</td>
                    <td class="key-highlight">2</td>
                    <td class="key-highlight">3</td>
                    <td class="key-highlight">4</td>
                    <td class="key-highlight">5</td>
                </tr>
            </table>
        </div>

        <div class="typing-area" id="display-container">
            <p style="color: #888; font-size: 20px;">Chọn bài học để bắt đầu luyện tập</p>
        </div>

        <div class="keyboard" id="kb-area">
            <div class="kb-row" id="r1"></div>
            <div class="kb-row" id="r2"></div>
            <div class="kb-row" id="r3"></div>
            <div class="kb-row"><div class="key space" id="k-space">SPACE</div></div>
        </div>

        <div class="hands-display" id="hands-area">
            <svg class="hand-svg" viewBox="0 0 200 150">
                <circle id="f-l-5" class="finger-dot" cx="30" cy="70" r="10" />
                <circle id="f-l-4" class="finger-dot" cx="60" cy="40" r="10" />
                <circle id="f-l-3" class="finger-dot" cx="100" cy="30" r="10" />
                <circle id="f-l-2" class="finger-dot" cx="140" cy="45" r="10" />
                <circle id="f-l-1" class="finger-dot" cx="170" cy="110" r="10" />
                <path d="M20,150 Q20,80 50,50 T150,50 T180,150" fill="none" stroke="#ccc" stroke-width="2"/>
            </svg>
            <svg class="hand-svg" viewBox="0 0 200 150">
                <circle id="f-r-1" class="finger-dot" cx="30" cy="110" r="10" />
                <circle id="f-r-2" class="finger-dot" cx="60" cy="45" r="10" />
                <circle id="f-r-3" class="finger-dot" cx="100" cy="30" r="10" />
                <circle id="f-r-4" class="finger-dot" cx="140" cy="40" r="10" />
                <circle id="f-r-5" class="finger-dot" cx="170" cy="70" r="10" />
                <path d="M20,150 Q20,80 50,50 T150,50 T180,150" fill="none" stroke="#ccc" stroke-width="2"/>
            </svg>
        </div>
    </div>

    <input type="text" id="hidden-input" style="opacity: 0; position: absolute;">

    <script>
        const lessons = {
            1: "aaaa ssss dddd ffff jjjj kkkk llll ;;;;",
            2: "asdf jkl; asdf jkl; asdf jkl;",
            3: "aa ss dd ff jj kk ll ;; af jk sd l;",
            4: "aaa sss ddd fff jjj kkk lll ;;;",
            5: "má mà mả mã mạ cá cà cả mã mạ",
            10: "lá lành đùm lá rách công cha như núi thái sơn",
            20: "hoàn thành bài tập luyện gõ 10 ngón"
        };

        const fingerMap = {
            'a': 'f-l-5', 's': 'f-l-4', 'd': 'f-l-3', 'f': 'f-l-2',
            'j': 'f-r-2', 'k': 'f-r-3', 'l': 'f-r-4', ';': 'f-r-5',
            ' ': 'f-r-1'
        };

        let currentIdx = 0, text = "", curLsn = 0;

        const menu = document.getElementById('lesson-links');
        for(let i=1; i<=20; i++) {
            const a = document.createElement('a'); a.className = 'nav-item'; a.id = `nav-${i}`;
            a.innerText = `Bài học ${i}`; a.onclick = () => startLesson(i); menu.appendChild(a);
        }

        const rows = ["qwertyuiop", "asdfghjkl;", "zxcvbnm"];
        rows.forEach((row, r) => {
            const container = document.getElementById('r' + (r+1));
            row.split('').forEach(char => {
                const k = document.createElement('div'); k.className = 'key'; k.id = 'k-' + char; k.innerText = char.toUpperCase(); container.appendChild(k);
            });
        });

        function startLesson(id) {
            curLsn = id;
            text = lessons[id] || "Nội dung đang cập nhật...";
            currentIdx = 0;
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${id}`).classList.add('active');
            
            // Hiện bảng hướng dẫn gõ dấu từ bài 5
            document.getElementById('viet-guide').style.display = id >= 5 ? 'block' : 'none';
            // Hiện lưu ý Unikey từ bài 1 đến 4
            document.getElementById('unikey-msg').style.display = id <= 4 ? 'block' : 'none';

            const container = document.getElementById('display-container');
            container.innerHTML = text.split('').map((char, i) => 
                `<span class="char-box" id="c-${i}">${char === ' ' ? '&nbsp;' : char}</span>`
            ).join('');

            updateHighlight();
            document.getElementById('hidden-input').focus();
        }

        function updateHighlight() {
            document.querySelectorAll('.char-box').forEach(el => el.classList.remove('current'));
            document.querySelectorAll('.key, .finger-dot').forEach(el => el.classList.remove('active'));

            const charEl = document.getElementById(`c-${currentIdx}`);
            if(!charEl) return;
            charEl.classList.add('current');

            const char = text[currentIdx].toLowerCase();
            const keyEl = document.getElementById(char === ' ' ? 'k-space' : 'k-' + char);
            if(keyEl) keyEl.classList.add('active');

            const fingerEl = document.getElementById(fingerMap[char] || 'f-r-1');
            if(fingerEl) fingerEl.classList.add('active');
        }

        document.getElementById('hidden-input').addEventListener('input', function(e) {
            if(!e.data) return;
            const targetChar = text[currentIdx];
            const charEl = document.getElementById(`c-${currentIdx}`);

            if(e.data === targetChar || (targetChar === ' ' && e.data === ' ')) {
                charEl.className = 'char-box correct';
                currentIdx++;
                this.value = "";
                if(currentIdx < text.length) updateHighlight();
                else alert("Chúc mừng! Bạn đã hoàn thành bài học.");
            } else {
                charEl.classList.add('wrong');
                this.value = "";
            }
        });

        document.addEventListener('click', () => document.getElementById('hidden-input').focus());
    </script>
</body>
</html>
