<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Typing Master PRO - Cứu Hộ Đôi Tay</title>
    <style>
        :root {
            --bg: #020617; --panel: #1e293b; --primary: #38bdf8;
            --success: #22c55e; --danger: #ef4444; --text: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg); color: var(--text);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar { width: 260px; background: #000; border-right: 1px solid #1e293b; display: flex; flex-direction: column; }
        .sb-title { padding: 30px; font-size: 16px; font-weight: 900; color: var(--primary); text-align: center; border-bottom: 1px solid #1e293b; }
        .ls-list { flex: 1; overflow-y: auto; padding: 15px; }
        .ls-item {
            padding: 12px; margin-bottom: 8px; border-radius: 8px;
            cursor: pointer; font-size: 14px; color: #64748b;
            display: flex; justify-content: space-between; transition: 0.2s;
            border: 1px solid transparent;
        }
        .ls-item:hover { background: rgba(56, 189, 248, 0.1); color: #fff; }
        .ls-item.active { background: var(--primary); color: #000; font-weight: bold; }

        /* MAIN AREA */
        .main { flex: 1; display: flex; flex-direction: column; }
        .stats {
            height: 70px; background: rgba(15, 23, 42, 0.8);
            display: flex; align-items: center; justify-content: center; gap: 50px;
            border-bottom: 1px solid #1e293b;
        }
        .stat-item { font-size: 20px; font-weight: bold; color: var(--primary); }

        .typing-zone {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; gap: 40px;
        }

        .display-area {
            width: 90%; max-width: 1000px; background: var(--panel);
            padding: 50px; border-radius: 24px; min-height: 200px;
            display: flex; flex-wrap: wrap; justify-content: center;
            align-content: center; gap: 12px; border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .word { display: flex; }
        .char { font-size: 36px; color: #475569; border-bottom: 3px solid transparent; transition: 0.1s; }
        .char.active { color: #fff; border-bottom-color: var(--primary); background: rgba(56, 189, 248, 0.1); }
        .char.ok { color: #e2e8f0; }
        .char.err { background: var(--danger); color: #fff; border-radius: 6px; }

        /* VIRTUAL KEYBOARD - TRẢ LẠI TAY CHO BẠN */
        .kb-container { background: #000; padding: 25px; border-radius: 20px; border: 2px solid #1e293b; }
        .kb-row { display: flex; gap: 8px; margin-bottom: 8px; justify-content: center; }
        .k-cap {
            width: 48px; height: 48px; background: #111827;
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 14px; font-weight: bold;
            color: #4b5563; border-bottom: 4px solid #000; transition: 0.1s;
        }
        .k-cap.on { 
            background: var(--primary); color: #000; 
            transform: translateY(2px); border-bottom-width: 1px;
            box-shadow: 0 0 20px var(--primary);
        }
        .k-cap.space { width: 300px; }

        #hidden-input { position: absolute; opacity: 0; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sb-title">TYPING DISCIPLINE</div>
    <div class="ls-list" id="ls-list"></div>
</div>

<div class="main">
    <div class="stats">
        <div class="stat-item">WPM: <span id="s-wpm">0</span></div>
        <div class="stat-item">ACC: <span id="s-acc">0%</span></div>
        <div id="mode-tag" style="font-size: 12px; padding: 5px 15px; border-radius: 10px;">MODE</div>
    </div>

    <div class="typing-zone">
        <div class="display-area" id="display"></div>
        
        <div class="kb-container" id="keyboard"></div>
        
        <div style="font-size: 13px; color: #64748b;">
            Dùng Unikey Telex: <b>S</b> (sắc), <b>F</b> (huyền), <b>R</b> (hỏi), <b>X</b> (ngã), <b>J</b> (nặng)
        </div>
    </div>
</div>

<input type="text" id="hidden-input" autofocus>

<script>
    const DATA = [
        "asdf jkl; asdf jkl;", "aaaa ssss dddd ffff", "jjjj kkkk llll ;;;;", "má mà mả mã mạ",
        "có công mài sắt có ngày nên kim", "uống nước nhớ nguồn", "học đi đôi với hành",
        "ăn quả nhớ kẻ trồng cây", "lá lành đùm lá rách", "thương người như thể thương thân"
    ];

    const KB = ["1234567890-=", "qwertyuiop[]", "asdfghjkl;'", "zxcvbnm,./"];
    let curL = 1, words = [], curIdx = 0, errors = 0, startTime = null, isCompiling = false;

    function init() {
        const list = document.getElementById('ls-list');
        DATA.forEach((_, i) => {
            const item = document.createElement('div');
            item.className = 'ls-item'; item.id = `ls-${i+1}`;
            item.innerHTML = `Bài ${i+1}`;
            item.onclick = () => loadLesson(i+1); list.appendChild(item);
        });

        const kbEl = document.getElementById('keyboard');
        KB.forEach(row => {
            const rDiv = document.createElement('div'); rDiv.className = 'kb-row';
            row.split('').forEach(k => { rDiv.innerHTML += `<div class="k-cap" id="k-${k}">${k.toUpperCase()}</div>`; });
            kbEl.appendChild(rDiv);
        });
        kbEl.innerHTML += `<div class="kb-row"><div class="k-cap space" id="k-space">SPACE</div></div>`;

        loadLesson(1);
        
        const input = document.getElementById('hidden-input');
        input.addEventListener('compositionstart', () => { isCompiling = true; });
        input.addEventListener('compositionend', () => { isCompiling = false; });

        input.onkeydown = (e) => { if(e.key === 'Backspace') e.preventDefault(); };

        input.oninput = (e) => {
            if(isCompiling) return;
            if(!startTime) startTime = new Date();
            
            const val = input.value;
            if(!val) return;

            // FIX LỖI GÕ ĐÚNG THÀNH SAI: Chuẩn hóa NFC
            const typed = val.trim().normalize('NFC');
            const target = words[curIdx].normalize('NFC');

            if(curL <= 3) {
                const charTyped = val.slice(-1);
                const el = document.getElementById(`c-${curIdx}`);
                if(charTyped === words[curIdx]) el.className = 'char ok';
                else { el.className = 'char err'; errors++; }
                curIdx++; input.value = "";
                checkEnd();
            } else {
                if(val.endsWith(' ')) {
                    const wEl = document.getElementById(`w-${curIdx}`);
                    if(typed === target) {
                        wEl.querySelectorAll('.char').forEach(c => c.className = 'char ok');
                    } else {
                        wEl.querySelectorAll('.char').forEach(c => c.className = 'char err');
                        errors++;
                    }
                    curIdx++; input.value = "";
                    checkEnd();
                }
            }
        };
        document.body.onclick = () => input.focus();
    }

    function loadLesson(id) {
        curL = id; curIdx = 0; errors = 0; startTime = null;
        document.querySelectorAll('.ls-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`ls-${id}`).classList.add('active');
        
        const tag = document.getElementById('mode-tag');
        tag.innerText = id <= 3 ? "TẮT UNIKEY" : "BẬT UNIKEY";
        tag.style.background = id <= 3 ? "#ef4444" : "#22c55e";

        const text = DATA[id-1].toLowerCase();
        words = (id <= 3) ? text.split('') : text.split(' ');
        
        const disp = document.getElementById('display');
        disp.innerHTML = words.map((w, i) => {
            if(id <= 3) return `<span class="char" id="c-${i}">${w === ' ' ? '&nbsp;' : w}</span>`;
            return `<div class="word" id="w-${i}">${w.split('').map((c, ci) => `<span class="char" id="c-${i}-${ci}">${c}</span>`).join('')}</div><span>&nbsp;</span>`;
        }).join('');
        
        updateH();
    }

    function updateH() {
        document.querySelectorAll('.char, .k-cap').forEach(el => el.classList.remove('active', 'on'));
        let target = "";
        if(curL <= 3) {
            const el = document.getElementById(`c-${curIdx}`);
            if(el) { el.classList.add('active'); target = words[curIdx]; }
        } else {
            const wEl = document.getElementById(`w-${curIdx}`);
            if(wEl) { 
                wEl.querySelector('.char').classList.add('active');
                target = words[curIdx][0];
            }
        }
        const k = document.getElementById(target === ' ' ? 'k-space' : `k-${target}`);
        if(k) k.classList.add('on');
    }

    function checkEnd() {
        updateStats();
        if(curIdx >= words.length) {
            alert(`Xong! Lỗi: ${errors}`);
            loadLesson(curL + 1);
        } else updateH();
    }

    function updateStats() {
        if(!startTime) return;
        const min = (new Date() - startTime) / 60000;
        document.getElementById('s-wpm').innerText = Math.round((curIdx / 5) / min) || 0;
        document.getElementById('s-acc').innerText = Math.round(((curIdx - errors) / curIdx) * 100) + "%";
    }

    window.onload = init;
</script>
</body>
</html>
