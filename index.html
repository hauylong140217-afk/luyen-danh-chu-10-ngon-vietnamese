<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện Gõ Tiếng Việt - Hướng Dẫn Ngón Tay</title>
    <style>
        :root { --bg: #f0f2f5; --primary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { font-family: Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: 220px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; padding: 10px 0; }
        .nav-item { padding: 6px 20px; color: #0056b3; text-decoration: none; display: block; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .nav-item.active { font-weight: bold; background: #e7f1ff; border-right: 4px solid var(--primary); }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        
        #unikey-note { width: 100%; max-width: 600px; background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #ffeeba; text-align: center; font-weight: bold; }

        .typing-box { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 80px; line-height: 2; margin-bottom: 20px; text-align: center; }
        .word-label { font-family: 'Consolas', monospace; font-size: 32px; padding: 0 8px; color: #ccc; border-bottom: 3px solid transparent; }
        .word-label.current { color: #000; background: #fff9c4; border-bottom-color: var(--primary); }
        .word-label.correct { color: var(--success); }
        .word-label.wrong { color: var(--danger); }

        /* Bàn phím ảo */
        .keyboard { background: #e9ecef; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .kb-row { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; }
        .key { width: 45px; height: 45px; background: white; border: 1px solid #ccc; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .key.active { background: var(--success) !important; color: white; transform: scale(1.05); box-shadow: 0 0 10px var(--success); }
        .key.space { width: 250px; }

        /* Sơ đồ bàn tay & Chấm xanh */
        .hands-container { position: relative; width: 500px; height: 180px; background: #eee; border-radius: 10px; display: flex; justify-content: space-around; align-items: flex-end; padding-bottom: 10px; transition: 0.3s; }
        .hands-container.hidden { opacity: 0; pointer-events: none; }
        .hand { width: 200px; height: 150px; border: 2px dashed #ccc; border-radius: 50% 50% 0 0; position: relative; display: flex; justify-content: space-around; padding-top: 20px; }
        .finger { width: 20px; height: 20px; background: #ddd; border-radius: 50%; position: relative; }
        .finger.active::after { content: ''; position: absolute; width: 14px; height: 14px; background: var(--success); border-radius: 50%; top: 3px; left: 3px; box-shadow: 0 0 8px var(--success); }
        .hand-label { position: absolute; bottom: -25px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar-menu">
        <a class="nav-item" onclick="location.reload()">🏠 Trang chủ</a>
        <div id="lesson-links" style="margin-top: 10px;"></div>
    </div>

    <div class="main">
        <div id="unikey-note" style="display:none">⚠️ Chuyển Unikey sang Tiếng Anh (E)</div>

        <div class="typing-box" id="typing-box">
            <div id="display-text">Chọn bài học 1-4 để thấy hướng dẫn ngón tay</div>
        </div>

        <div class="keyboard" id="kb-area">
            <div class="kb-row" id="r1"></div>
            <div class="kb-row" id="r2"></div>
            <div class="kb-row" id="r3"></div>
            <div class="kb-row"><div class="key space" id="k-space">SPACE</div></div>
        </div>

        <div class="hands-container" id="hands-area">
            <div class="hand" id="left-hand">
                <div class="finger" id="f-left-5"></div> <div class="finger" id="f-left-4"></div> <div class="finger" id="f-left-3"></div> <div class="finger" id="f-left-2"></div> <div class="hand-label">TAY TRÁI</div>
            </div>
            <div class="hand" id="right-hand">
                <div class="finger" id="f-right-2"></div> <div class="finger" id="f-right-3"></div> <div class="finger" id="f-right-4"></div> <div class="finger" id="f-right-5"></div> <div class="hand-label">TAY PHẢI</div>
            </div>
            <div class="finger" id="f-thumb" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%)"></div>
            <div style="position:absolute; bottom:5px; left:50%; transform:translateX(-50%); font-size:10px">NGÓN CÁI (CÁCH)</div>
        </div>
    </div>

    <input type="text" id="input-hidden" autofocus>

    <script>
        const lessons = { 1: "as af ar ax aj", 2: "sa fa ra xa ja", 3: "asdf jkl; asdf jkl;", 4: "aaaa ffff ssss jjjj", 5: "má mà mả mã mạ", 10: "lá lành đùm lá rách", 20: "hoàn thành khóa học" };
        const fingerMap = {
            'a': 'f-left-5', 's': 'f-left-4', 'd': 'f-left-3', 'f': 'f-left-2',
            'j': 'f-right-2', 'k': 'f-right-3', 'l': 'f-right-4', ';': 'f-right-5',
            ' ': 'f-thumb'
        };

        let currentIdx = 0, words = [], curLsn = 0;

        // Tạo Menu & Bàn phím
        const menu = document.getElementById('lesson-links');
        for(let i=1; i<=20; i++) {
            const a = document.createElement('a'); a.className = 'nav-item'; a.id = `nav-${i}`;
            a.innerText = `Bài học ${i}`; a.onclick = () => startLesson(i); menu.appendChild(a);
        }

        const rows = ["qwertyuiop", "asdfghjkl;", "zxcvbnm"];
        rows.forEach((row, r) => {
            const container = document.getElementById('r' + (r+1));
            row.split('').forEach(char => {
                const k = document.createElement('div'); k.className = 'key'; k.id = 'k-' + char; k.innerText = char.toUpperCase(); container.appendChild(k);
            });
        });

        function startLesson(id) {
            curLsn = id;
            words = (lessons[id] || "nội dung bài học đang cập nhật").split(' ');
            currentIdx = 0;
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${id}`).classList.add('active');
            document.getElementById('unikey-note').style.display = id <= 4 ? 'block' : 'none';
            document.getElementById('hands-area').className = id <= 4 ? 'hands-container' : 'hands-container hidden';

            const display = document.getElementById('display-text');
            display.innerHTML = words.map((w, i) => `<label class="word-label" id="w-${i}">${w}</label>`).join('');

            updateState();
            document.getElementById('input-hidden').value = "";
            document.getElementById('input-hidden').focus();
        }

        function updateState() {
            document.querySelectorAll('.word-label').forEach(el => el.classList.remove('current'));
            document.querySelectorAll('.key, .finger').forEach(el => el.classList.remove('active'));

            const label = document.getElementById(`w-${currentIdx}`);
            if(!label) return;
            label.classList.add('current');

            if(curLsn <= 4) {
                const firstChar = words[currentIdx][0];
                const keyEl = document.getElementById('k-' + firstChar) || document.getElementById('k-space');
                if(keyEl) keyEl.classList.add('active');

                const fingerId = fingerMap[firstChar] || 'f-thumb';
                const fingerEl = document.getElementById(fingerId);
                if(fingerEl) fingerEl.classList.add('active');
            }
        }

        document.getElementById('input-hidden').addEventListener('input', (e) => {
            if(e.target.value.endsWith(' ')) {
                const typed = e.target.value.trim();
                const label = document.getElementById(`w-${currentIdx}`);
                label.className = 'word-label ' + (typed === words[currentIdx] ? 'correct' : 'wrong');
                currentIdx++;
                e.target.value = "";
                if(currentIdx < words.length) updateState();
                else alert("Xong bài!");
            }
        });

        document.addEventListener('click', () => document.getElementById('input-hidden').focus());
    </script>
</body>
</html>
