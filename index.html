<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Master - Đôi Bàn Tay</title>
    <style>
        :root {
            /* Tự động theo hệ thống */
            --bg: #f8fafc; --panel: #ffffff; --primary: #38bdf8;
            --success: #22c55e; --danger: #ef4444; --text: #1e293b;
            --kb-bg: #e2e8f0; --key-bg: #ffffff;
            /* Màu các ngón tay */
            --p1: #f472b6; --r1: #fbbf24; --m1: #4ade80; --i1: #60a5fa;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617; --panel: #1e293b; --text: #f8fafc;
                --kb-bg: #000; --key-bg: #111827;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .ls-list { flex: 1; overflow-y: auto; padding: 10px; }
        .ls-item { padding: 10px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
        .ls-item.active { background: var(--primary); color: #000; font-weight: bold; }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .stats { height: 60px; display: flex; align-items: center; justify-content: space-around; background: rgba(0,0,0,0.03); }
        .stat-val { font-weight: bold; color: var(--primary); font-size: 18px; }

        .typing-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 30px; }
        .display-box {
            width: 100%; max-width: 800px; background: var(--panel); padding: 40px; border-radius: 20px;
            min-height: 150px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .word { font-size: 32px; border-bottom: 3px solid transparent; }
        .word.active { border-bottom-color: var(--primary); background: rgba(56, 189, 248, 0.1); }
        .word.ok { color: var(--success); }
        .word.err { background: var(--danger); color: #fff; border-radius: 4px; }

        /* BÀN TAY & BÀN PHÍM */
        .hands-container { display: flex; gap: 40px; align-items: flex-end; }
        .hand-img { width: 120px; opacity: 0.3; transition: 0.2s; }
        .hand-img.active { opacity: 1; filter: drop-shadow(0 0 10px var(--primary)); }

        .kb-box { background: var(--kb-bg); padding: 15px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.05); }
        .kb-row { display: flex; gap: 4px; margin-bottom: 4px; justify-content: center; }
        .key {
            width: 45px; height: 45px; background: var(--key-bg); border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; border-bottom: 3px solid rgba(0,0,0,0.2);
        }
        /* Gán màu cho phím theo ngón tay */
        .k-p1 { border-top: 3px solid var(--p1); } .k-r1 { border-top: 3px solid var(--r1); }
        .k-m1 { border-top: 3px solid var(--m1); } .k-i1 { border-top: 3px solid var(--i1); }
        
        .key.active { background: var(--primary); color: #000; transform: translateY(2px); border-bottom: none; }
        .key.space { width: 250px; }

        /* BẢNG ĐIỂM */
        #result {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .card { background: var(--panel); padding: 40px; border-radius: 20px; text-align: center; }
        
        #hidden-input { position: fixed; top: -100px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="ls-list" id="ls-list"></div>
</div>

<div class="main">
    <div class="stats">
        <div>WPM: <span id="wpm-val" class="stat-val">0</span></div>
        <div>Độ chính xác: <span id="acc-val" class="stat-val">0%</span></div>
    </div>

    <div class="typing-area">
        <div class="display-box" id="display"></div>
        
        <div class="hands-container">
            <div id="hand-l" class="hand-side">
                <svg class="hand-img" id="svg-l" viewBox="0 0 100 100"><path d="M20,80 Q10,50 30,20 T50,10 T70,20 T80,50 L80,80 Z" fill="currentColor"/></svg>
            </div>
            
            <div class="kb-box" id="keyboard"></div>

            <div id="hand-r" class="hand-side">
                <svg class="hand-img" id="svg-r" viewBox="0 0 100 100"><path d="M80,80 Q90,50 70,20 T50,10 T30,20 T20,50 L20,80 Z" fill="currentColor"/></svg>
            </div>
        </div>
    </div>

    <div id="result">
        <div class="card">
            <h2>BÀI TẬP HOÀN TẤT</h2>
            <div id="final-stats" style="margin: 20px 0;"></div>
            <button onclick="nextLesson()" style="padding:10px 20px; cursor:pointer">Tiếp tục</button>
        </div>
    </div>
</div>

<input type="text" id="hidden-input" autofocus>

<script>
    const DATA = ["asdf jkl; asdf jkl;", "má mà mả mã mạ", "uống nước nhớ nguồn", "ăn quả nhớ kẻ trồng cây"];
    const ROWS = [
        {k:"1234567890-=", f:["p1","p1","r1","m1","i1","i1","i1","i1","m1","r1","p1","p1"]},
        {k:"qwertyuiop[]", f:["p1","r1","m1","i1","i1","i1","i1","m1","r1","p1","p1","p1"]},
        {k:"asdfghjkl;'", f:["p1","r1","m1","i1","i1","i1","i1","m1","r1","p1","p1"]},
        {k:"zxcvbnm,./", f:["p1","r1","m1","i1","i1","i1","i1","m1","r1","p1"]}
    ];

    let curL = 1, words = [], curIdx = 0, errors = 0, startTime = null, isCompiling = false;

    function init() {
        const list = document.getElementById('ls-list');
        DATA.forEach((d, i) => {
            list.innerHTML += `<div class="ls-item" id="ls-${i+1}" onclick="loadLesson(${i+1})">Bài ${i+1} <small id="s-${i+1}">--</small></div>`;
        });

        const kb = document.getElementById('keyboard');
        ROWS.forEach(row => {
            const rDiv = document.createElement('div'); rDiv.className = 'kb-row';
            row.k.split('').forEach((key, i) => {
                rDiv.innerHTML += `<div class="key k-${row.f[i]}" id="k-${key}">${key.toUpperCase()}</div>`;
            });
            kb.appendChild(rDiv);
        });
        kb.innerHTML += `<div class="kb-row"><div class="key space" id="k-space">SPACE</div></div>`;

        loadLesson(1);
        setupEvents();
    }

    function setupEvents() {
        const input = document.getElementById('hidden-input');
        input.addEventListener('compositionstart', () => isCompiling = true);
        input.addEventListener('compositionend', () => isCompiling = false);

        input.oninput = () => {
            if (isCompiling) return;
            if (!startTime) startTime = new Date();
            const val = input.value;
            const target = words[curIdx].normalize('NFC');

            if (val.endsWith(' ') || (curIdx === words.length-1 && val.normalize('NFC') === target)) {
                const el = document.getElementById(`w-${curIdx}`);
                if (val.trim().normalize('NFC') === target) el.className = 'word ok';
                else { el.className = 'word err'; errors++; }
                curIdx++; input.value = "";
                if (curIdx >= words.length) showResult();
                else updateUI();
            }
        };
        document.body.onclick = () => input.focus();
    }

    function loadLesson(id) {
        curL = id; curIdx = 0; errors = 0; startTime = null;
        document.getElementById('result').style.display = 'none';
        document.querySelectorAll('.ls-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`ls-${id}`).classList.add('active');
        words = DATA[id-1].split(' ');
        document.getElementById('display').innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
        updateUI();
    }

    function updateUI() {
        document.querySelectorAll('.word, .key, .hand-img').forEach(el => el.classList.remove('active'));
        const wordEl = document.getElementById(`w-${curIdx}`);
        if (!wordEl) return;
        wordEl.classList.add('active');

        const nextChar = words[curIdx][0].toLowerCase();
        const keyEl = document.getElementById(`k-${nextChar}`) || document.getElementById('k-space');
        if (keyEl) {
            keyEl.classList.add('active');
            // Kích hoạt bàn tay tương ứng (trái/phải)
            const isLeft = "qwertasdfgzxcv12345".includes(nextChar);
            document.getElementById(isLeft ? 'svg-l' : 'svg-r').classList.add('active');
        }
    }

    function showResult() {
        const acc = Math.round(((words.length - errors) / words.length) * 100);
        document.getElementById('final-stats').innerHTML = `Độ chính xác: ${acc}%`;
        document.getElementById('result').style.display = 'flex';
        document.getElementById(`s-${curL}`).innerText = acc + "%";
    }

    function nextLesson() {
        loadLesson(curL < DATA.length ? curL + 1 : 1);
    }

    window.onload = init;
</script>
</body>
</html>
