<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Typing Master ULTIMATE - Custom Edition</title>
    <style>
        :root {
            --bg-h: 222; --bg-s: 47%; --bg-l: 11%;
            --primary: #38bdf8; --success: #22c55e; --danger: #ef4444; --text: #f8fafc;
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: hsl(var(--bg-h), var(--bg-s), var(--bg-l));
            color: var(--text); display: flex; height: 100vh; overflow: hidden; margin: 0;
        }

        /* SIDEBAR & SETTINGS */
        .sidebar { width: 260px; background: rgba(0,0,0,0.3); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; padding: 20px; }
        .config-group { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .config-group label { display: block; font-size: 12px; margin-bottom: 10px; color: var(--primary); }
        input[type="range"] { width: 100%; cursor: pointer; }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; }
        .typing-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; }
        
        .display-area {
            width: 90%; max-width: 900px; padding: 40px; border-radius: 20px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
        }
        .char { font-size: 32px; color: #475569; border-bottom: 3px solid transparent; }
        .char.active { color: #fff; border-bottom-color: var(--primary); }
        .char.ok { color: var(--success); }
        .char.err { background: var(--danger); color: #fff; border-radius: 4px; }

        /* KEYBOARD */
        .kb-container { background: #000; padding: 20px; border-radius: 20px; border: 2px solid #334155; }
        .kb-row { display: flex; gap: 5px; margin-bottom: 5px; justify-content: center; }
        .k-cap {
            width: 45px; height: 45px; background: #111827; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; color: #4b5563; border-bottom: 3px solid #000;
        }
        .k-cap.on { background: var(--primary); color: #000; transform: translateY(2px); border-bottom-width: 1px; }

        #hidden-input { position: fixed; top: -100px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="font-size: 18px; text-align: center;">THIẾT LẬP</h2>
    
    <div class="config-group">
        <label>ĐỘ SÁNG NỀN</label>
        <input type="range" id="bg-light" min="5" max="40" value="11">
    </div>

    <div class="config-group">
        <label>MÀU SẮC (HUE)</label>
        <input type="range" id="bg-hue" min="0" max="360" value="222">
    </div>

    <div id="ls-list" style="margin-top:20px; overflow-y:auto; flex:1;"></div>
</div>

<div class="main">
    <div class="typing-zone">
        <div id="status" style="color: var(--success); font-weight: bold;">ĐANG ĐỢI PHÍM...</div>
        <div class="display-area" id="display"></div>
        <div class="kb-container" id="keyboard"></div>
    </div>
</div>

<input type="text" id="hidden-input" autofocus>

<script>
    const DATA = ["asdf jkl; asdf jkl;", "má mà mả mã mạ", "học đi đôi với hành", "ăn quả nhớ kẻ trồng cây"];
    const KB_LAYOUT = ["1234567890-=", "qwertyuiop[]", "asdfghjkl;'", "zxcvbnm,./"];
    let curL = 1, words = [], curIdx = 0, isCompiling = false;

    // CHỈNH GIAO DIỆN
    const root = document.documentElement;
    document.getElementById('bg-light').oninput = (e) => root.style.setProperty('--bg-l', e.target.value + '%');
    document.getElementById('bg-hue').oninput = (e) => root.style.setProperty('--bg-h', e.target.value);

    function init() {
        const kb = document.getElementById('keyboard');
        KB_LAYOUT.forEach(row => {
            const r = document.createElement('div'); r.className = 'kb-row';
            row.split('').forEach(k => r.innerHTML += `<div class="k-cap" id="k-${k}">${k.toUpperCase()}</div>`);
            kb.appendChild(r);
        });

        const list = document.getElementById('ls-list');
        DATA.forEach((d, i) => {
            const item = document.createElement('div');
            item.style = "padding:10px; cursor:pointer; border-bottom:1px solid #333";
            item.innerText = `Bài ${i+1}: ${d.substring(0, 10)}...`;
            item.onclick = () => loadLesson(i+1);
            list.appendChild(item);
        });

        loadLesson(1);
        setupInput();
    }

    function setupInput() {
        const input = document.getElementById('hidden-input');
        
        input.addEventListener('compositionstart', () => { isCompiling = true; });
        input.addEventListener('compositionend', (e) => { 
            isCompiling = false;
            // Xử lý ngay sau khi kết thúc tổ hợp phím tiếng Việt
            handleWordEntry(input.value.trim());
            input.value = "";
        });

        input.oninput = (e) => {
            if (isCompiling) return;
            const val = input.value;
            if (val.endsWith(' ')) {
                handleWordEntry(val.trim());
                input.value = "";
            } else if (curL === 1) { // Bài luyện phím đơn
                handleCharEntry(val.slice(-1));
                input.value = "";
            }
        };
        document.body.onclick = () => input.focus();
    }

    function handleWordEntry(typed) {
        const target = words[curIdx].normalize('NFC');
        const typedNorm = typed.normalize('NFC');
        const wEl = document.getElementById(`w-${curIdx}`);
        
        if (typedNorm === target) {
            wEl.style.color = 'var(--success)';
            curIdx++;
            checkEnd();
        } else if (typedNorm.length >= target.length) {
            wEl.style.background = 'var(--danger)';
            curIdx++;
            checkEnd();
        }
    }

    function handleCharEntry(char) {
        const target = words[curIdx];
        const el = document.getElementById(`c-${curIdx}`);
        if (char === target) el.className = 'char ok';
        else el.className = 'char err';
        curIdx++;
        checkEnd();
    }

    function loadLesson(id) {
        curL = id; curIdx = 0;
        words = (id === 1) ? DATA[id-1].split('') : DATA[id-1].split(' ');
        const disp = document.getElementById('display');
        disp.innerHTML = words.map((w, i) => {
            if(id === 1) return `<span class="char" id="c-${i}">${w === ' ' ? '&nbsp;' : w}</span>`;
            return `<span class="char" id="w-${i}" style="margin-right:15px">${w}</span>`;
        }).join('');
        updateH();
    }

    function updateH() {
        document.querySelectorAll('.char, .k-cap').forEach(el => el.classList.remove('active', 'on'));
        if (curIdx >= words.length) return;
        
        let target = (curL === 1) ? words[curIdx] : words[curIdx][0];
        if (document.getElementById(`c-${curIdx}`)) document.getElementById(`c-${curIdx}`).classList.add('active');
        if (document.getElementById(`w-${curIdx}`)) document.getElementById(`w-${curIdx}`).classList.add('active');
        
        const k = document.getElementById(`k-${target.toLowerCase()}`);
        if(k) k.classList.add('on');
    }

    function checkEnd() {
        if (curIdx >= words.length) alert("Tuyệt vời! Qua bài tiếp theo nào.");
        else updateH();
    }

    window.onload = init;
</script>
</body>
</html>
