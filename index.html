<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Typing Master - Ha Uy Long & Gemini</title>
    <style>
        :root {
            --bg: #f8f9fa; --sidebar-w: 250px; --primary: #007bff;
            --success: #28a745; --danger: #dc3545; --dark: #343a40;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: var(--dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h2 { padding: 20px; font-size: 18px; border-bottom: 1px solid #495057; margin: 0; color: var(--primary); text-align: center; }
        .nav-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .nav-item { padding: 10px 20px; color: #adb5bd; text-decoration: none; display: block; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: #495057; color: white; border-left: 4px solid var(--primary); }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        .container { width: 90%; max-width: 900px; padding: 40px 0; display: flex; flex-direction: column; align-items: center; }

        /* Label Display Area */
        .typing-box { width: 100%; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); min-height: 200px; }
        .word-label { 
            display: inline-block; font-family: 'Consolas', monospace; font-size: 32px; 
            margin: 10px 12px; padding: 2px 8px; border-radius: 6px; 
            color: #dee2e6; border-bottom: 3px solid transparent; transition: 0.2s;
        }
        .word-label.current { color: #212529; border-bottom-color: var(--primary); background: #e7f1ff; }
        .word-label.correct { color: var(--success); border-bottom-color: var(--success); }
        .word-label.wrong { color: var(--danger); border-bottom-color: var(--danger); background: #fff5f5; }

        /* Keyboard Guide */
        .keyboard { display: flex; flex-direction: column; gap: 6px; background: #e9ecef; padding: 20px; border-radius: 12px; margin-top: 30px; }
        .row { display: flex; gap: 6px; justify-content: center; }
        .key { 
            width: 50px; height: 50px; background: white; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border: 1px solid #dee2e6; font-size: 16px; color: #495057;
        }
        .key.active { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,123,255,0.3); }
        .key.space { width: 300px; }

        /* Modal */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.2); display: none; z-index: 100; text-align: center; }
        
        #input-hidden { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>TYPING MASTER</h2>
        <div class="nav-list">
            <a class="nav-item active" onclick="showHome()">🏠 Trang chủ</a>
            <div style="padding: 10px 20px; font-size: 12px; color: #6c757d; font-weight: bold;">DANH SÁCH BÀI HỌC</div>
            <div id="lesson-links"></div>
            <a class="nav-item" onclick="showIntro()">ℹ️ Giới thiệu</a>
        </div>
    </div>

    <div class="main">
        <div class="container" id="content-area">
            <h1 id="title">Luyện Gõ 10 Ngón</h1>
            
            <div class="typing-box" id="typing-box">
                <div id="text-display"></div>
            </div>

            <div class="keyboard">
                <div class="row" id="row-1"></div>
                <div class="row" id="row-2"></div>
                <div class="row" id="row-3"></div>
                <div class="row"><div class="key space" id="key-space">Space</div></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <h2 style="color: var(--success);">HOÀN THÀNH!</h2>
        <p id="result-text"></p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">Tiếp tục</button>
    </div>

    <input type="text" id="input-hidden">

    <script>
        const lessons = {
            1: "aa ss dd ff jj kk ll ;;",
            2: "asdf jkl; asdf jkl;",
            3: "ee rr tt uu ii oo pp",
            4: "Học đi đôi với hành.",
            5: "Chúc bạn thành công.",
            // Bạn có thể thêm tiếp đến bài 15 ở đây
        };

        let currentWordIdx = 0, words = [], curLesson = 0;

        // Khởi tạo phím ảo
        const rows = ["qwertyuiop", "asdfghjkl;", "zxcvbnm"];
        rows.forEach((r, idx) => {
            const rowEl = document.getElementById(`row-${idx+1}`);
            r.split('').forEach(char => {
                const k = document.createElement('div');
                k.className = 'key'; k.id = 'key-' + char; k.innerText = char.toUpperCase();
                rowEl.appendChild(k);
            });
        });

        // Khởi tạo danh sách bài học Sidebar
        const linkContainer = document.getElementById('lesson-links');
        for(let i=1; i<=15; i++) {
            const a = document.createElement('a');
            a.className = 'nav-item';
            a.innerText = `Bài học ${i}`;
            a.onclick = () => startLesson(i);
            linkContainer.appendChild(a);
        }

        function startLesson(id) {
            curLesson = id;
            const text = lessons[id] || "Dữ liệu bài học đang cập nhật...";
            words = text.split(' ');
            currentWordIdx = 0;
            
            document.getElementById('title').innerText = `Bài học ${id}`;
            const display = document.getElementById('text-display');
            display.innerHTML = words.map((w, i) => `<label class="word-label" id="word-${i}">${w}</label>`).join('');
            
            document.getElementById('word-0').classList.add('current');
            highlightKey(words[0][0]);
            document.getElementById('input-hidden').focus();
        }

        document.getElementById('input-hidden').addEventListener('input', (e) => {
            const input = e.target.value;
            const currentLabel = document.getElementById(`word-${currentWordIdx}`);
            const targetWord = words[currentWordIdx];

            // Highlight phím tiếp theo
            highlightKey(targetWord[input.length] || ' ');

            // Kiểm tra khi nhấn phím Space (cách)
            if (input.endsWith(' ')) {
                const typed = input.trim();
                if (typed === targetWord) {
                    currentLabel.className = 'word-label correct';
                } else {
                    currentLabel.className = 'word-label wrong';
                }

                currentWordIdx++;
                e.target.value = "";

                if (currentWordIdx < words.length) {
                    const nextWord = document.getElementById(`word-${currentWordIdx}`);
                    nextWord.classList.add('current');
                    highlightKey(words[currentWordIdx][0]);
                } else {
                    showResult();
                }
            }
        });

        function highlightKey(char) {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
            if (!char) return;
            const id = char === ' ' ? 'key-space' : 'key-' + char.toLowerCase();
            const el = document.getElementById(id);
            if (el) el.classList.add('active');
        }

        function showResult() {
            document.getElementById('modal').style.display = 'block';
            document.getElementById('result-text').innerText = `Bạn đã hoàn thành bài học ${curLesson}!`;
        }

        function showHome() { location.reload(); }
        function showIntro() { alert("Ứng dụng luyện gõ 10 ngón Tiếng Việt.\nPhát triển bởi Ha Uy Long & Gemini."); }

        document.addEventListener('click', () => document.getElementById('input-hidden').focus());
    </script>
</body>
</html>
