<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Typing Master - Full Mode</title>
    <style>
        :root { --bg: #f0f2f5; --primary: #0984e3; --success: #00b894; --danger: #d63031; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h2 { padding: 25px; font-size: 18px; border-bottom: 1px solid #444; margin: 0; color: var(--primary); text-align: center; }
        .nav-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .nav-item { padding: 12px 25px; color: #b2bec3; text-decoration: none; display: block; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .nav-item.active { background: #3b444b; color: white; border-left: 5px solid var(--primary); }
        .nav-game { background: #e67e22 !important; color: white !important; margin-top: 10px; }

        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        
        /* Bảng hướng dẫn */
        .guide-container { 
            width: 100%; max-width: 850px; background: white; padding: 15px; 
            border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.5s;
        }
        .guide-container.hidden { opacity: 0; transform: translateY(-20px); pointer-events: none; height: 0; margin: 0; padding: 0; }
        .guide-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .guide-table th, .guide-table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .guide-table th { background: #f8f9fa; }

        /* Typing Box */
        .typing-box { width: 100%; max-width: 850px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 120px; line-height: 2.5; }
        .word-wrap { display: inline-flex; align-items: center; }
        .word-label { font-family: 'Consolas', monospace; font-size: 32px; padding: 2px 8px; border-radius: 5px; color: #ced4da; transition: 0.2s; }
        .space-indicator { font-family: 'Consolas', monospace; font-size: 24px; color: #eee; margin: 0 5px; }
        .space-indicator.active { color: var(--primary); font-weight: bold; }
        .space-indicator.correct { color: var(--success); }
        .word-label.current { color: #2d3436; background: #e1f5fe; border-bottom: 4px solid var(--primary); }
        .word-label.correct { color: var(--success); }
        .word-label.wrong { color: var(--danger); background: #fff5f5; border-bottom: 4px solid var(--danger); }

        /* Keyboard */
        .keyboard { display: flex; flex-direction: column; gap: 8px; background: #dfe6e9; padding: 20px; border-radius: 15px; margin-top: 20px; transition: 0.5s; }
        .keyboard.disabled { opacity: 0; transform: translateY(50px); pointer-events: none; }
        .row { display: flex; gap: 8px; justify-content: center; }
        .key { width: 45px; height: 45px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #b2bec3; font-size: 14px; }
        .key.active { background: var(--primary); color: white; transform: scale(1.1); }
        .key.space { width: 250px; }

        /* Game Stage */
        #game-stage { width: 850px; height: 450px; background: #2d3436; border-radius: 20px; position: relative; overflow: hidden; display: none; margin-top: 20px; }
        .falling-word { position: absolute; color: #00d2d3; font-family: 'Consolas', monospace; font-size: 24px; font-weight: bold; padding: 5px 10px; background: rgba(255,255,255,0.1); border-radius: 5px; }

        /* Modal Result */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.3); display: none; z-index: 100; text-align: center; }
        .btn { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }

        #input-hidden { position: absolute; opacity: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>TYPING MASTER</h2>
        <div class="nav-list" id="lesson-links"></div>
        <a class="nav-item nav-game" onclick="showGame()">🎮 TRÒ CHƠI RƠI CHỮ</a>
    </div>

    <div class="main" id="main-content">
        <div class="guide-container" id="viet-guide">
            <table class="guide-table">
                <tr><th>Dấu</th><th>Sắc</th><th>Huyền</th><th>Hỏi</th><th>Ngã</th><th>Nặng</th><th>Â, Ê, Ô</th><th>Ă, Ư, Ơ</th></tr>
                <tr><td><b>Telex</b></td><td>s</td><td>f</td><td>r</td><td>x</td><td>j</td><td>aa, ee, oo</td><td>aw, uw, ow</td></tr>
                <tr><td><b>VNI</b></td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7, 8</td></tr>
            </table>
        </div>

        <h2 id="lesson-title">Bài học 1</h2>
        
        <div class="typing-box" id="display-area"></div>

        <div class="keyboard" id="main-keyboard">
            <div class="row" id="r1"></div><div class="row" id="r2"></div><div class="row" id="r3"></div>
            <div class="row"><div class="key space" id="k-space">SPACE</div></div>
        </div>

        <div id="game-stage">
            <div id="game-area"></div>
            <div style="position: absolute; bottom: 10px; right: 20px; color: white;">Điểm: <span id="game-score">0</span></div>
        </div>
    </div>

    <div class="modal" id="result-modal">
        <h2 style="color: var(--success)">HOÀN THÀNH!</h2>
        <div id="score-info"></div>
        <button class="btn" onclick="nextLesson()">BÀI TIẾP THEO ➔</button>
    </div>

    <input type="text" id="input-hidden" autofocus>

    <script>
        const lessons = {
            1: "aa ss dd ff jj kk ll ;;",
            2: "as df jk l; as df jk l;",
            3: "aa dd ss ff jj ll kk ;;",
            4: "fads jall asks fads lall",
            5: "con cò bé bé đậu cành tre"
        };

        let currentIdx = 0, words = [], curLsnId = 1, errors = 0, isGaming = false;
        let gameWords = [], gameScore = 0, spawnInterval;

        // Khởi tạo Keyboard
        const layout = ["qwertyuiop", "asdfghjkl;", "zxcvbnm"];
        layout.forEach((r, i) => {
            const row = document.getElementById('r' + (i + 1));
            r.split('').forEach(c => {
                const k = document.createElement('div');
                k.className = 'key'; k.id = 'k-' + c; k.innerText = c.toUpperCase();
                row.appendChild(k);
            });
        });

        // Menu Sidebar
        const list = document.getElementById('lesson-links');
        for(let i=1; i<=15; i++) {
            const a = document.createElement('a'); a.className = 'nav-item';
            a.id = 'nav-'+i; a.innerText = `Bài học ${i}`; a.onclick = () => startLesson(i);
            list.appendChild(a);
        }

        function startLesson(id) {
            isGaming = false; clearInterval(spawnInterval);
            curLsnId = id;
            const text = lessons[id] || "Bài luyện tập nâng cao cho câu " + id;
            words = text.split(' ');
            currentIdx = 0; errors = 0;
            
            // ẨN HƯỚNG DẪN & BÀN PHÍM TỪ BÀI 5
            const guide = document.getElementById('viet-guide');
            const kb = document.getElementById('main-keyboard');
            const gameStage = document.getElementById('game-stage');
            
            gameStage.style.display = 'none';
            document.getElementById('display-area').style.display = 'block';
            
            if(id >= 5) { guide.classList.add('hidden'); kb.classList.add('disabled'); }
            else { guide.classList.remove('hidden'); kb.classList.remove('disabled'); }

            document.getElementById('lesson-title').innerText = `Bài học ${id}`;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-'+id).classList.add('active');
            document.getElementById('result-modal').style.display = 'none';

            document.getElementById('display-area').innerHTML = words.map((w, i) => `
                <span class="word-wrap">
                    <label class="word-label" id="word-${i}">${w}</label>
                    ${i < words.length - 1 ? `<span class="space-indicator" id="space-${i}">_</span>` : ''}
                </span>
            `).join('');
            
            updateWordStatus();
            document.getElementById('input-hidden').value = "";
            document.getElementById('input-hidden').focus();
        }

        function updateWordStatus() {
            document.querySelectorAll('.word-label').forEach(l => l.classList.remove('current'));
            const current = document.getElementById(`word-${currentIdx}`);
            if (current) {
                current.classList.add('current');
                highlightKey(words[currentIdx][0]);
            }
        }

        function showGame() {
            isGaming = true; gameScore = 0; gameWords = [];
            document.getElementById('lesson-title').innerText = "Trò chơi: Mưa từ vựng";
            document.getElementById('display-area').style.display = 'none';
            document.getElementById('viet-guide').classList.add('hidden');
            document.getElementById('main-keyboard').classList.add('disabled');
            document.getElementById('game-stage').style.display = 'block';
            document.getElementById('game-area').innerHTML = "";
            document.getElementById('game-score').innerText = "0";
            
            spawnInterval = setInterval(spawnFallingWord, 2000);
            requestAnimationFrame(gameLoop);
        }

        function spawnFallingWord() {
            if(!isGaming) return;
            const v = ["hoc", "tap", "vui", "ve", "go", "nhanh", "phim", "dung"];
            const txt = v[Math.floor(Math.random()*v.length)];
            const el = document.createElement('div');
            el.className = 'falling-word'; el.innerText = txt;
            el.style.left = Math.random() * 750 + "px";
            document.getElementById('game-area').appendChild(el);
            gameWords.push({ el, y: 0, txt });
        }

        function gameLoop() {
            if(!isGaming) return;
            gameWords.forEach((w, i) => {
                w.y += 1.5;
                w.el.style.top = w.y + "px";
                if(w.y > 420) { w.el.remove(); gameWords.splice(i, 1); }
            });
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('input-hidden').addEventListener('input', (e) => {
            const val = e.target.value;
            if(!isGaming) {
                const target = words[currentIdx];
                if (val.endsWith(' ')) {
                    const typed = val.trim();
                    const label = document.getElementById(`word-${currentIdx}`);
                    const sp = document.getElementById(`space-${currentIdx}`);
                    if (typed === target) {
                        label.className = 'word-label correct';
                        if(sp) sp.className = 'space-indicator correct';
                    } else { label.className = 'word-label wrong'; errors++; }
                    currentIdx++; e.target.value = "";
                    if (currentIdx < words.length) updateWordStatus();
                    else showScore();
                } else {
                    if(val.length >= target.length) {
                        highlightKey(' ');
                        const sp = document.getElementById(`space-${currentIdx}`);
                        if(sp) sp.classList.add('active');
                    } else highlightKey(target[val.length]);
                }
            } else {
                for(let i=0; i<gameWords.length; i++) {
                    if(val === gameWords[i].txt) {
                        gameWords[i].el.remove(); gameWords.splice(i, 1);
                        gameScore += 10; document.getElementById('game-score').innerText = gameScore;
                        e.target.value = ""; break;
                    }
                }
            }
        });

        function showScore() {
            const acc = Math.round(((words.length - errors) / words.length) * 100);
            document.getElementById('score-info').innerHTML = `Độ chính xác: <b>${acc}%</b> | Lỗi: <b>${errors}</b>`;
            document.getElementById('result-modal').style.display = 'block';
        }

        function nextLesson() { startLesson(curLsnId + 1); }

        function highlightKey(char) {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
            if (!char) return;
            const id = char === ' ' ? 'k-space' : 'k-' + char.toLowerCase();
            const el = document.getElementById(id);
            if (el) el.classList.add('active');
        }

        document.addEventListener('click', () => document.getElementById('input-hidden').focus());
        window.onload = () => startLesson(1);
    </script>
</body>
</html>
