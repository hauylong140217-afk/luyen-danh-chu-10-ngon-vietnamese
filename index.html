<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện Gõ 10 Ngón - Hà Uy Long & Gemini</title>
    <style>
        :root { --bg: #f0f2f5; --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #343a40; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: 220px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .sidebar-header { padding: 20px; font-weight: bold; color: var(--primary); border-bottom: 2px solid #eee; text-align: center; font-size: 18px; }
        .nav-item { padding: 12px 20px; color: #444; cursor: pointer; border-left: 4px solid transparent; font-size: 13px; border-bottom: 1px solid #f9f9f9; }
        .nav-item:hover { background: #f8f9fa; }
        .nav-item.active { background: #e7f1ff; border-left-color: var(--primary); font-weight: bold; color: var(--primary); }

        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        .content-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; padding-bottom: 250px; }

        .intro-section { width: 100%; max-width: 800px; text-align: center; margin-bottom: 15px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        .intro-section h2 { margin: 0; color: var(--dark); font-size: 22px; }
        .intro-section p { font-size: 15px; color: #666; margin: 10px 0 0 0; }

        .note-box { width: 100%; max-width: 800px; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .note-unikey { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .note-v { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; font-size: 22px !important; }

        .typing-box { width: 100%; max-width: 800px; text-align: center; margin: 20px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px 6px; }
        .char { font-family: 'Consolas', monospace; font-size: 30px; color: #bbb; padding: 2px 5px; border-radius: 4px; }
        .char.current { color: #000; border-bottom: 4px solid var(--primary); background: #fffde7; }
        .char.correct { color: var(--success); }
        .char.wrong { color: white; background: var(--danger); }

        .keyboard-wrapper { background: #dee2e6; padding: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; border-top: 2px solid #bbb; position: absolute; bottom: 0; left: 0; z-index: 10; }
        .kb-row { display: flex; gap: 6px; justify-content: center; margin-bottom: 6px; }
        .key { width: 45px; height: 45px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #aaa; font-size: 15px; }
        .key.active { background: var(--success) !important; color: white; }
        .key.space { width: 250px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .result-box { background: white; padding: 40px; border-radius: 15px; text-align: center; max-width: 400px; width: 90%; }
        .btn-next { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">LỘ TRÌNH 60 BÀI</div>
        <div id="lesson-list"></div>
    </div>

    <div class="main">
        <div class="content-area">
            <div class="intro-section">
                <h2>Hệ Thống Luyện Gõ 10 Ngón</h2>
                <p>Hợp tác phát triển: <b>Hà Uy Long & AI Gemini</b></p>
            </div>
            <div id="dynamic-note" class="note-box note-unikey">⚠️ LƯU Ý: CHUYỂN UNIKEY SANG TIẾNG ANH (CHỮ E)</div>
            <div class="typing-box" id="target-text"></div>
        </div>
        <div class="keyboard-wrapper">
            <div class="kb-row" id="r1"></div><div class="kb-row" id="r2"></div><div class="kb-row" id="r3"></div>
            <div class="kb-row"><div class="key space" id="k-space">SPACE</div></div>
        </div>
    </div>

    <div class="modal" id="modal-res">
        <div class="result-box">
            <h2 id="modal-title">Hoàn thành!</h2>
            <p id="stats-info" style="font-size: 20px; color: #555;"></p>
            <button class="btn-next" id="btn-next-action" onclick="handleNextStep()">Bài tiếp theo ➔</button>
        </div>
    </div>

    <input type="text" id="keyboard-input" style="position: absolute; opacity: 0;" autocomplete="off">

    <script>
        const lessons = {
            1: "aaaa ssss dddd ffff jjjj kkkk llll ;;;;",
            2: "asdf jkl; asdf jkl; asdf jkl; asdf jkl;",
            3: "aa ss dd ff jj kk ll ;; af jk sd l;",
            4: "gh gh gh gh ty ty ty ty ur ur ur ur",
            5: "má mà mả mã mạ cá cà cả mã mạ",
            6: "con cò bé bé nó đậu cành tre đi không hỏi mẹ",
            7: "học thầy không tày học bạn tiên học lễ hậu học văn",
            8: "uống nước nhớ nguồn ăn quả nhớ kẻ trồng cây",
            9: "một cây làm chẳng nên non ba cây chụm lại nên hòn núi cao",
            10: "có công mài sắt có ngày nên kim kiên trì sẽ thành công",
            11: "kiến tha lâu cũng đầy tổ cần cù bù thông minh",
            12: "lá lành đùm lá rách anh em như thể tay chân",
            13: "bầu ơi thương lấy bí cùng tuy rằng khác giống nhưng chung một giàn",
            14: "đường đời nhiều ngã rẽ quan trọng là bạn chọn đúng hướng đi",
            15: "thất bại là mẹ thành công chớ thấy sóng cả mà ngã tay chèo",
            16: "có chí thì nên gần mực thì đen gần đèn thì sáng",
            17: "đi một ngày đàng học một sàng khôn lời nói chẳng mất tiền mua",
            18: "lựa lời mà nói cho vừa lòng nhau kính trên nhường dưới",
            19: "rách lành đùm bọc dở hay đỡ đần một con ngựa đau cả tàu bỏ cỏ",
            20: "ăn trông nồi ngồi trông hướng học ăn học nói học gói học mở",
            21: "không có gì quý hơn độc lập tự do hạnh phúc muôn năm",
            22: "đoàn kết đoàn kết đại đoàn kết thành công thành công đại thành công",
            23: "kiên trì nhẫn nại là chìa khóa mở cánh cửa tương lai",
            24: "đừng bao giờ từ bỏ ước mơ hãy luôn tin tưởng vào bản thân",
            25: "hãy sống như hôm nay là ngày cuối cùng bạn được sống",
            26: "tương lai nằm trong tay bạn hãy nỗ lực ngay từ hôm nay",
            27: "sách là kho tàng tri thức vô tận của nhân loại",
            28: "đọc muôn quyển sách đi muôn dặm đường mở mang kiến thức",
            29: "sức khỏe là vàng hãy chăm sóc bản thân mỗi ngày",
            30: "thời gian là tiền bạc đừng lãng phí từng giây phút quý giá",
            31: "lòng tốt là ngôn ngữ chung mà ai cũng có thể hiểu",
            32: "sống chậm lại để cảm nhận vẻ đẹp của thế giới xung quanh",
            33: "mọi khó khăn chỉ là thử thách giúp bạn trưởng thành hơn",
            34: "vượt qua chính mình là chiến thắng hiển hách nhất",
            35: "hãy luôn mỉm cười với cuộc sống dù có chuyện gì xảy ra",
            36: "gieo nhân nào gặt quả nấy hãy sống tử tế với mọi người",
            37: "trung thực là đức tính quý giá nhất của mỗi con người",
            38: "khiêm tốn bao nhiêu cũng chưa đủ tự phụ một chút cũng là thừa",
            39: "hành trình vạn dặm bắt đầu từ những bước chân nhỏ nhất",
            40: "ngọc bất trác bất thành khí nhân bất học bất tri lý",
            41: "có nuôi con mới biết lòng cha mẹ ơn nghĩa sinh thành",
            42: "cây có cội nước có nguồn luôn ghi nhớ về cội nguồn",
            43: "lá rụng về cội tình yêu quê hương luôn cháy bỏng",
            44: "trâu ta ăn cỏ đồng ta dù trong dù đục ao nhà vẫn hơn",
            45: "tốt gỗ hơn tốt nước sơn cái nết đánh chết cái đẹp",
            46: "đói cho sạch rách cho thơm giữ gìn phẩm giá con người",
            47: "giấy rách phải giữ lấy lề lòng tự trọng là trên hết",
            48: "gần bùn mà chẳng hôi tanh mùi bùn giữ tâm trong sáng",
            49: "một chữ cũng là thầy nửa chữ cũng là thầy tôn sư trọng đạo",
            50: "không thầy đố mày làm nên công ơn giáo dưỡng của thầy cô",
            51: "muốn sang thì bắc cầu kiều muốn con hay chữ phải yêu lấy thầy",
            52: "kỷ luật là sức mạnh của quân đội và của sự thành công",
            53: "tự do của bạn kết thúc nơi tự do của người khác bắt đầu",
            54: "kiến thức là sức mạnh nhưng hành động mới tạo ra kết quả",
            55: "hãy học cách lắng nghe để thấu hiểu và sẻ chia nhiều hơn",
            56: "sáng tạo là chìa khóa để giải quyết mọi vấn đề phức tạp",
            57: "lòng biết ơn giúp chúng ta trân trọng những gì đang có",
            58: "sự im lặng đôi khi là câu trả lời tốt đẹp nhất",
            59: "đỉnh núi cao nhất luôn nằm ở phía trước hãy tiếp tục leo",
            60: "chúc mừng bạn đã hoàn thành xuất sắc sáu mươi bài luyện tập cùng hà uy long và ai gemini"
        };

        let currentIdx = 0, currentLesson = 1, errors = 0, wordsArray = [];
        const list = document.getElementById('lesson-list');
        for(let i=1; i<=60; i++) {
            const div = document.createElement('div');
            div.className = 'nav-item'; div.id = `nav-${i}`;
            div.innerText = `Bài học ${i}`;
            div.onclick = () => loadLesson(i);
            list.appendChild(div);
        }

        const rows = ["qwertyuiop", "asdfghjkl;", "zxcvbnm"];
        rows.forEach((str, idx) => {
            const container = document.getElementById(`r${idx+1}`);
            str.split('').forEach(char => {
                const key = document.createElement('div');
                key.className = 'key'; key.id = `key-${char}`;
                key.innerText = char.toUpperCase();
                container.appendChild(key);
            });
        });

        function loadLesson(id) {
            currentLesson = id;
            let rawText = lessons[id];
            currentIdx = 0; errors = 0;
            const noteEl = document.getElementById('dynamic-note');
            if (id >= 5) {
                noteEl.innerText = "⚠️ LƯU Ý: CHUYỂN UNIKEY SANG TIẾNG VIỆT (CHỮ V)";
                noteEl.className = "note-box note-v";
            } else {
                noteEl.innerText = "⚠️ LƯU Ý: CHUYỂN UNIKEY SANG TIẾNG ANH (CHỮ E)";
                noteEl.className = "note-box note-unikey";
            }
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(document.getElementById(`nav-${id}`)) document.getElementById(`nav-${id}`).classList.add('active');
            document.getElementById('modal-res').style.display = 'none';
            const display = document.getElementById('target-text');
            if (id >= 5) {
                wordsArray = rawText.split(' ');
                display.innerHTML = wordsArray.map((w, i) => `<span class="char" id="char-${i}">${w}</span>`).join('<span>&nbsp;</span>');
            } else {
                wordsArray = rawText.split('');
                display.innerHTML = wordsArray.map((c, i) => `<span class="char" id="char-${i}">${c === ' ' ? '&nbsp;' : c}</span>`).join('');
            }
            updateState();
            document.getElementById('keyboard-input').focus();
        }

        function updateState() {
            document.querySelectorAll('.char').forEach(el => el.classList.remove('current'));
            document.querySelectorAll('.key').forEach(el => el.classList.remove('active'));
            const activeChar = document.getElementById(`char-${currentIdx}`);
            if(!activeChar) return;
            activeChar.classList.add('current');
            activeChar.scrollIntoView({ behavior: 'smooth', block: 'center' });
            if (currentLesson < 5) {
                const char = wordsArray[currentIdx].toLowerCase();
                const keyEl = document.getElementById(char === ' ' ? 'k-space' : `key-${char}`);
                if(keyEl) keyEl.classList.add('active');
            }
        }

        document.getElementById('keyboard-input').addEventListener('keydown', (e) => {
            if (currentLesson >= 5 && e.key === ' ') {
                e.preventDefault();
                const typedWord = e.target.value.trim();
                if(!typedWord) return;
                const charEl = document.getElementById(`char-${currentIdx}`);
                if (typedWord === wordsArray[currentIdx]) charEl.className = 'char correct';
                else { charEl.className = 'char wrong'; errors++; }
                currentIdx++;
                e.target.value = "";
                if (currentIdx < wordsArray.length) updateState(); else finish();
            }
        });

        document.getElementById('keyboard-input').addEventListener('input', (e) => {
            if (currentLesson < 5) {
                const typed = e.target.value.slice(-1);
                const target = wordsArray[currentIdx];
                const charEl = document.getElementById(`char-${currentIdx}`);
                if(typed === target || (target === ' ' && typed === ' ')) {
                    charEl.className = 'char correct';
                    currentIdx++;
                } else { charEl.className = 'char wrong'; errors++; }
                if(currentIdx < wordsArray.length) updateState(); else finish();
                e.target.value = "";
            }
        });

        function finish() {
            const accuracy = Math.round(((wordsArray.length - errors) / wordsArray.length) * 100);
            document.getElementById('stats-info').innerHTML = `Độ chính xác: <b>${accuracy}%</b><br>Số lỗi: <b>${errors}</b>`;
            const btn = document.getElementById('btn-next-action');
            if (currentLesson === 60) {
                document.getElementById('modal-title').innerText = "🏆 TUYỆT VỜI!";
                btn.innerText = "Luyện lại bài 1 ↺";
            } else {
                document.getElementById('modal-title').innerText = "Xong bài " + currentLesson;
                btn.innerText = "Bài tiếp theo ➔";
            }
            document.getElementById('modal-res').style.display = 'flex';
        }

        function handleNextStep() {
            if (currentLesson >= 60) loadLesson(1); else loadLesson(currentLesson + 1);
        }

        window.onload = () => loadLesson(1);
        document.onclick = () => document.getElementById('keyboard-input').focus();
    </script>
</body>
</html>
