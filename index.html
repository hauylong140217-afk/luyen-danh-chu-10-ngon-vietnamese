<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Typing Master - Mỗi Bài Một Câu</title>
    <style>
        :root {
            --bg: #f1f3f6; --sidebar-w: 260px; --primary: #007bff;
            --success: #28a745; --danger: #dc3545; --dark: #2d3436;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: var(--dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.2); }
        .sidebar h2 { padding: 25px 20px; font-size: 18px; border-bottom: 1px solid #444; margin: 0; color: var(--primary); text-align: center; }
        .nav-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .nav-item { padding: 12px 20px; color: #b2bec3; text-decoration: none; display: block; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: #3b444b; color: white; border-left: 5px solid var(--primary); }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .container { width: 90%; max-width: 900px; padding: 30px 0; display: flex; flex-direction: column; align-items: center; }

        /* Guide */
        .guide-box { background: white; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 25px; border: 1px solid #ddd; }
        .guide-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .guide-table th, .guide-table td { border: 1px solid #f1f1f1; padding: 8px; text-align: center; }
        .guide-table th { background: #f8f9fa; color: #636e72; }

        /* Typing Box */
        .typing-box { width: 100%; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 180px; position: relative; }
        #text-display { text-align: left; line-height: 2; }
        .word-label { 
            display: inline-block; font-family: 'Consolas', monospace; font-size: 32px; 
            margin: 5px 12px; padding: 2px 10px; border-radius: 8px; color: #dfe6e9;
            transition: 0.3s;
        }
        .word-label.current { color: #2d3436; background: #e1f5fe; border-bottom: 4px solid var(--primary); }
        .word-label.correct { color: var(--success); }
        .word-label.wrong { color: var(--danger); background: #fff5f5; border-bottom: 4px solid var(--danger); }

        /* Keyboard */
        .keyboard { display: flex; flex-direction: column; gap: 8px; background: #dfe6e9; padding: 20px; border-radius: 15px; margin-top: 30px; }
        .row { display: flex; gap: 8px; justify-content: center; }
        .key { 
            width: 55px; height: 55px; background: white; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border: 1px solid #b2bec3; font-size: 16px; 
        }
        .key.active { background: var(--primary); color: white; transform: scale(1.1); box-shadow: 0 5px 15px rgba(0,123,255,0.4); }
        .key.space { width: 350px; }

        #input-hidden { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>TYPING MASTER</h2>
        <div class="nav-list">
            <a class="nav-item active" onclick="location.reload()">🏠 Trang chủ</a>
            <div style="padding: 15px 20px 5px; font-size: 11px; color: #636e72; font-weight: bold;">15 BÀI TẬP (CÂU HỎI)</div>
            <div id="lesson-links"></div>
            <a class="nav-item" onclick="alert('Phiên bản Mỗi Bài Một Câu - Ha Uy Long & Gemini')">ℹ️ Giới thiệu</a>
        </div>
    </div>

    <div class="main">
        <div class="container">
            <div class="guide-box">
                <table class="guide-table">
                    <tr><th>Dấu (Telex)</th><th>Sắc (s)</th><th>Huyền (f)</th><th>Hỏi (r)</th><th>Ngã (x)</th><th>Nặng (j)</th><th>Â/Ê/Ô (aa/ee/oo)</th><th>Ă/Ư/Ơ (aw/uw/ow)</th></tr>
                </table>
            </div>

            <div class="typing-box">
                <div id="text-display">Vui lòng chọn một bài học bên trái để bắt đầu luyện tập câu!</div>
            </div>

            <div class="keyboard">
                <div class="row" id="kb-r1"></div>
                <div class="row" id="kb-r2"></div>
                <div class="row" id="kb-r3"></div>
                <div class="row"><div class="key space" id="k-space">Dấu cách (Space)</div></div>
            </div>
        </div>
    </div>

    <input type="text" id="input-hidden">

    <script>
        // Danh sách 15 bài - Mỗi bài là một câu khác nhau
        const lessons = {
            1: "aa ss dd ff jj kk ll ;;",
            2: "asdf jkl; asdf jkl;",
            3: "con cò bé bé đậu cành tre.",
            4: "học đi đôi với hành luôn tốt.",
            5: "trời xanh mây trắng nắng vàng.",
            6: "luyện tập hằng ngày giúp gõ nhanh.",
            7: "không nên nhìn xuống bàn phím.",
            8: "giữ lưng thẳng khi ngồi làm việc.",
            9: "ngón tay đặt đúng vị trí cơ sở.",
            10: "quy tắc gõ dấu telex rất đơn giản.",
            11: "kiên trì nhẫn nại sẽ thành công.",
            12: "tốc độ và chính xác là mục tiêu.",
            13: "tiếng việt có dấu rất phong phú.",
            14: "chúc bạn sớm trở thành chuyên gia.",
            15: "hoàn thành mười lăm bài luyện tập."
        };

        let currentWordIdx = 0, words = [], currentLesson = 0;

        // Khởi tạo phím ảo
        const layout = ["qwertyuiop", "asdfghjkl;", "zxcvbnm"];
        layout.forEach((r, i) => {
            const row = document.getElementById('kb-r' + (i + 1));
            r.split('').forEach(char => {
                const k = document.createElement('div');
                k.className = 'key'; k.id = 'k-' + char; k.innerText = char.toUpperCase();
                row.appendChild(k);
            });
        });

        // Tạo danh sách bài học
        const nav = document.getElementById('lesson-links');
        for(let i=1; i<=15; i++) {
            const a = document.createElement('a'); a.className = 'nav-item';
            a.id = 'nav-' + i; a.innerText = `Bài học ${i}`;
            a.onclick = () => startLesson(i); nav.appendChild(a);
        }

        function startLesson(id) {
            currentLesson = id;
            const text = lessons[id];
            words = text.split(' ');
            currentWordIdx = 0;
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');

            const display = document.getElementById('text-display');
            display.innerHTML = words.map((w, i) => `<label class="word-label" id="word-${i}">${w}</label>`).join('');
            
            setWordActive(0);
            document.getElementById('input-hidden').value = "";
            document.getElementById('input-hidden').focus();
        }

        function setWordActive(idx) {
            document.querySelectorAll('.word-label').forEach(l => l.classList.remove('current'));
            const el = document.getElementById(`word-${idx}`);
            if(el) {
                el.classList.add('current');
                updateKeyHighlight(words[idx][0]);
            }
        }

        document.getElementById('input-hidden').addEventListener('input', (e) => {
            const input = e.target.value;
            const currentLabel = document.getElementById(`word-${currentWordIdx}`);
            const targetWord = words[currentWordIdx];

            if (input.endsWith(' ')) {
                const typed = input.trim();
                // So sánh chính xác từng từ kể cả khi lặp lại
                if (typed === targetWord) {
                    currentLabel.className = 'word-label correct';
                } else {
                    currentLabel.className = 'word-label wrong';
                }

                currentWordIdx++;
                e.target.value = "";

                if (currentWordIdx < words.length) {
                    setWordActive(currentWordIdx);
                } else {
                    alert(`Chúc mừng! Bạn đã gõ xong câu của Bài học ${currentLesson}`);
                }
            } else {
                updateKeyHighlight(targetWord[input.length]);
            }
        });

        function updateKeyHighlight(char) {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
            if (!char) return;
            let id = char === ' ' ? 'k-space' : 'k-' + char.toLowerCase();
            const el = document.getElementById(id);
            if (el) el.classList.add('active');
        }

        document.addEventListener('click', () => document.getElementById('input-hidden').focus());
    </script>
</body>
</html>
